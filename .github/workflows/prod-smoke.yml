# ─── Prod-Smoke: Watchdog über die eigene Live-Site ─────────────────────────
# FAHRPLAN-BASIS-AUSBAU §A5 (B-11). Gegenstück zu normen-monitor.yml: jener
# überwacht die QUELLEN (Fedlex/LexWork/Materialien), dieser die eigene PROD.
# Prüft Kernrouten (200 + Inhalt), den ehrlichen JSON-503/200 der Edge-Suche,
# Sitemap, statische Assets und die CSP-Kopfzeile. Bei Rot ein sichtbarer Issue
# (Muster wie normen-monitor; keine Issue-Flut). Reine Netz-Prüfung, kein
# npm-Build, keine Env-Secrets nötig — läuft kontolos mit dem Repo.
name: Prod-Smoke

on:
  schedule:
    - cron: '43 */6 * * *' # alle 6 h (Minute 43, entzerrt gegen andere Jobs)
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Basis-URL (Default lexmetrik.vercel.app)'
        required: false

jobs:
  smoke:
    name: Kernrouten · Edge-Suche · Sitemap · Assets · CSP
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Prod-Smoke fahren
        env:
          SMOKE_BASE_URL: ${{ github.event.inputs.base_url }}
        run: npm run smoke:prod
      # Bei Rot: sichtbaren Aufgaben-Zettel anlegen/aktualisieren (kein Issue-Regen).
      - name: Bei Rot — sichtbaren Aufgaben-Zettel anlegen/aktualisieren
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          offen=$(gh issue list --state open --search 'Prod-Smoke rot in:title' --json number --jq '.[0].number // empty')
          rumpf="Der Prod-Smoke ist rot — die Live-Site verletzt einen harten Betriebs-Vertrag (Kernroute nicht 200, Edge-Suche liefert HTML statt JSON, Sitemap/Asset weg oder CSP-Kopf fehlt). **Rückweg**: docs/betrieb/rollback-runbook.md (\`vercel rollback\`). Lauf: ${RUN_URL}"
          if [ -n "$offen" ]; then
            gh issue comment "$offen" --body "Erneut rot am $(date +%F). ${rumpf}"
          else
            gh issue create --title "🔴 Prod-Smoke rot ($(date +%F)) — Live-Site prüfen / ggf. Rollback" --body "$rumpf"
          fi
