# ─── Turso-Serving-Sync an Daten-Diff gekoppelt (O-2.6, QS-DATA §5 E2) ──────
# Bisher war datenhaltung:turso-sync ein reiner Handlauf — Reader (statische JSONs)
# und Prod-Suche (Turso-Replika) konnten zwei Frische-Wahrheiten servieren. Dieser
# Job synchronisiert die HOT-Replika automatisch, sobald sich auf main die
# servierten Korpus-Daten aendern, und prueft danach die Live-Paritaet.
#
# Secret TURSO_AUTH_TOKEN (Schreib-Token) — David-Rahmen-Gate 16.7.2026 freigegeben.
# Ohne Secret degradiert der Job ehrlich (ueberspringt den Sync, meldet es).
#
# ── Reparatur 20.7.2026: warum dieser Workflow zwei Jobs hat ───────────────────────────
# Vom 18. bis 20.7.2026 lief `sync` sechsmal in `timeout-minutes: 20` und wurde jedes Mal
# `cancelled`. GitHub faerbt einen abgebrochenen Lauf GRAU, nicht rot — es fiel tagelang
# niemandem auf, obwohl BS-Import #300 (3765 Entscheide), G-REF #299, ASYLV2 #304 und die
# Richter-PRs #309/#310 nie in die Suche gelangten. Ursache war NICHT der Timeout, sondern
# der Transport: der Sync schickte je Zeile ein eigenes Hrana-`execute`, also einen durablen
# Commit PRO ZEILE (~33 Zeilen/s → 46 min fuer 61k Zeilen). Behoben in turso-sync.ts durch
# Mehrzeilen-INSERTs in BEGIN/COMMIT (gemessen 43x schneller). Zwei Konsequenzen hier:
#   1. `timeout-minutes` bleibt eine ECHTE Notbremse mit Reserve, nicht die Loesung.
#   2. Der Job `frische` laeuft taeglich per cron und wird ROT, wenn die Replika hinterher-
#      hinkt oder unvollstaendig ist. Ein abgebrochener Sync kann damit nicht mehr schweigen —
#      genau das war der eigentliche Schaden (§8).
name: Turso-Serving-Sync

on:
  push:
    branches: [main]
    paths:
      - 'public/normtext/**'
      - 'public/rechtsprechung/**'
      - 'daten-manifest.json'
  schedule:
    # Taeglich 05:17 UTC — Frische-Waechter, unabhaengig davon ob jemand pusht.
    - cron: '17 5 * * *'
  workflow_dispatch:

concurrency:
  group: turso-sync
  cancel-in-progress: false

jobs:
  sync:
    name: Build HOT-Artefakt · Turso-Sync · Live-Paritaet
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    # Gemessene Laufzeit des vollstaendigen Syncs nach der Transport-Reparatur: siehe
    # PR-Beschreibung. Der Wert traegt Reserve fuer Korpus-Wachstum und schwankende
    # Runner-Bandbreite — er ist die Notbremse, nicht das Zeitbudget.
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - name: Token vorhanden?
        id: token
        env:
          T: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: |
          if [ -n "$T" ]; then echo "da=1" >> "$GITHUB_OUTPUT"; else
            echo "da=0" >> "$GITHUB_OUTPUT"
            echo "::warning::Kein TURSO_AUTH_TOKEN — Sync uebersprungen (ehrliche Degradierung)."
          fi

      - name: HOT-Artefakt bauen (aus committeten JSONs, reproduzierbar)
        if: steps.token.outputs.da == '1'
        run: npm run datenhaltung:build

      # Beweist, dass der SOEBEN gebaute lokale Stand zum committeten daten-manifest.json
      # passt — nicht nur in den Zeilenzahlen (das prueft der Quell-Riegel im Sync selbst),
      # sondern ueber die Inhalts-SHAs je Tabelle. Ohne diesen Schritt koennte ein
      # verstuemmelter Build synchronisiert werden und waere danach ueberall gruen, weil
      # sich die ganze Kette gegen ihre eigene Ladung validiert (Gegenpruefung Runde 4).
      # Laeuft sonst nur im PR-Gate (`check:seriell`), also nicht auf diesem Pfad.
      - name: Build gegen committetes Manifest pruefen (check:datenhaltung)
        if: steps.token.outputs.da == '1'
        run: npm run check:datenhaltung

      - name: Turso-Sync (Voll-Rebuild ueber Schatten-Tabellen, determinismus-beweisbar)
        if: steps.token.outputs.da == '1'
        env:
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: npm run datenhaltung:turso-sync

      # Harter Schritt: beweist, dass die Replika den committeten Stand traegt UND
      # vollstaendig ist. Faengt insbesondere den halb-gedroppten Zustand, der vorher
      # tagelang unbemerkt live lag.
      - name: Frische-Waechter (Replika == committetes daten-manifest.json)
        if: steps.token.outputs.da == '1'
        env:
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: npm run check:turso-frische

      - name: Live-Paritaets-Stichprobe (Prod /api/suche, Artikel UND Entscheide)
        if: steps.token.outputs.da == '1'
        run: |
          set -uo pipefail
          basis="https://lexmetrik.vercel.app/api/suche"
          fehler=0
          # Prod deployt nach dem Merge parallel — bis zu 5 Versuche mit Pause, danach ROT.
          # (Frueher war jeder Nicht-200 nur eine Warnung; damit konnte die Stichprobe
          # dauerhaft nichts pruefen, ohne je rot zu werden.)
          probe() {
            local q="$1" feld="$2" versuch=1 code gesamt
            while [ "$versuch" -le 5 ]; do
              code=$(curl -s -o /tmp/r.json -w '%{http_code}' --max-time 25 "${basis}?q=${q}") || code=000
              if [ "$code" = "200" ]; then
                gesamt=$(jq -r ".${feld}.gesamt // 0" /tmp/r.json 2>/dev/null || echo 0)
                if [ "${gesamt:-0}" -gt 0 ] 2>/dev/null; then
                  echo "ok: /api/suche '$q' -> ${feld}.gesamt=${gesamt}"
                  return 0
                fi
                echo "  Versuch ${versuch}: HTTP 200, aber ${feld}.gesamt=${gesamt}"
              else
                echo "  Versuch ${versuch}: HTTP ${code} (Prod evtl. noch am Deployen)"
              fi
              versuch=$((versuch + 1))
              # Nach dem letzten Versuch nicht mehr warten (dieselbe Klasse wie B10 im Sync).
              [ "$versuch" -le 5 ] && sleep 30
            done
            echo "::error::/api/suche '$q' liefert dauerhaft keine ${feld}-Treffer."
            return 1
          }
          for q in "OR%20319" "ZGB%201" "StGB%20111"; do
            probe "$q" artikel || fehler=1
          done
          # Entscheid-Pfad separat — er war es, der komplett fehlte (Tabelle nicht vorhanden).
          probe "Beschwerde" entscheide || fehler=1
          exit $fehler

  frische:
    name: Frische-Waechter (taeglich) — haengt die Replika hinterher?
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Der Waechter muss sich MELDEN koennen, wenn er nichts pruefen kann. Ohne Token
      # endet check:turso-frische ehrlich mit "UEBERSPRUNGEN" und Exit 0 — im Sync-Job ist
      # das richtig (dort wurde auch nicht gesynct), im taeglichen Waechter waere es fatal:
      # faellt oder verfaellt das Secret, waere der Wachhund fuer immer gruen, ohne je zu
      # pruefen. Darum hier ein eigener, harter Token-Riegel.
      - name: Token vorhanden? (im Waechter HART — sonst prueft er nie und schweigt)
        env:
          T: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: |
          if [ -z "$T" ]; then
            echo "::error::TURSO_AUTH_TOKEN fehlt — der Frische-Waechter kann die Replika nicht pruefen."
            exit 1
          fi
      - name: check:turso-frische
        env:
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: npm run check:turso-frische
