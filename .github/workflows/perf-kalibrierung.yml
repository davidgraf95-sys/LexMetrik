# ─── Perf-Kalibrierung: Messreihe über N unabhängige Runner ─────────────────
#
# Zweck: die Schwellen des §15-Tors (`check:perf-lighthouse`) empirisch erheben,
# statt sie zu raten — und belegen, ob die TBT-Normierung die Streuung wirklich
# senkt.
#
# WARUM EINE MATRIX UND KEINE WIEDERHOLTEN LÄUFE: die zu messende Streuung sitzt
# ZWISCHEN den Jobs (heterogener GitHub-Runner-Pool, Faktor 2.5 auf TBT), nicht
# innerhalb. Wiederholte Workflow-Läufe auf demselben Branch helfen dafür nicht:
# die `concurrency`-Gruppe der CI würde sie gegenseitig abbrechen, und sie kosten
# je einen vollen Durchlauf. EINE Matrix mit N Jobs bekommt dagegen N unabhängige
# Runner-Zuteilungen gleichzeitig — genau die gesuchte Stichprobe.
#
# Der Lauf ASSERTIERT NICHTS (`--messen`): er misst und druckt je Job eine
# `PERF-MESSPUNKT {…}`-Zeile (Rohwerte + Kalibrier-TBT). Aggregation:
#   gh run view <id> --log | grep -o 'PERF-MESSPUNKT .*'
# Daraus: sd(TBT roh) gegen sd(TBT normiert) — und die neuen Deckel.
#
# Nur `workflow_dispatch`: kein Beitrag zur PR-Wartezeit, kein Required Check.
name: Perf-Kalibrierung (Messreihe, assertiert nicht)

on:
  # TEMPORÄR während der Kalibrier-Einheit: `workflow_dispatch` ist erst
  # verfügbar, wenn die Datei auf dem Default-Branch liegt. Vor dem Merge wieder
  # entfernt — danach trägt `workflow_dispatch` allein.
  push:
    branches: [fix/ci-falschrot]
  workflow_dispatch:
    inputs:
      runs:
        description: 'Lighthouse-Läufe je Seite (Median daraus)'
        default: '3'
      kalibrier_runs:
        description: 'Kalibrier-Läufe je Job (Median daraus)'
        default: '3'

jobs:
  messen:
    name: Messpunkt ${{ matrix.punkt }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 8 unabhängige Runner-Zuteilungen = Stichprobe der Between-Job-Varianz.
        punkt: [1, 2, 3, 4, 5, 6, 7, 8]
    env:
      TZ: Europe/Zurich
      PERF_RUNS: ${{ github.event.inputs.runs }}
      PERF_KALIBRIER_RUNS: ${{ github.event.inputs.kalibrier_runs }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build (dist für die Messung)
        run: npm run build
      - name: Playwright-Browser (Chromium — Lighthouse steuert ihn)
        run: npx playwright install --with-deps chromium
      - name: Messung (keine Assertion)
        run: npm run check:perf-lighthouse -- --messen
