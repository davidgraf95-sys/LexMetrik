# ─── «Tore»-Zwilling für reine Doku-Änderungen ────────────────────────────────
# ci.yml ignoriert **.md (paths-ignore) — seit «Tore …» ein Required-Check ist
# (3.7.2026), wären reine .md-PRs sonst PERMANENT unmergbar (Check wird nie
# gemeldet). Dieser Zwilling triggert INVERS (nur **.md) und meldet denselben
# Job-Namen als No-op-Erfolg. GitHub-Standardmuster für required checks + paths.
#
# check:plan LÄUFT HIER TROTZDEM (10.7.2026): reine .md-PRs sind genau die
# Klasse, die @meta-Waisen erzeugt (ROADMAP.md/STRUKTUR.md-Änderungen ohne
# Code) — und das war exakt die Lücke, durch die 3 Waisen grün mergten,
# weil check:plan bislang NIRGENDS in CI lief. Der Schritt bleibt trotzdem
# günstig: nur Node + npm ci + ein vite-node-Skript, kein Build/Playwright.
#
# ERWEITERT 21.7.2026: David setzte am 20.7. sechs Required Checks auf main;
# dieser Zwilling meldete aber nur «Tore …» — die 3 Playwright-Shards und
# «Perf-Budget» wurden bei .md-only-PRs NIE gemeldet, darum hingen reine
# .md-PRs (#318, #320) permanent unmergbar. Deshalb unten je ein No-op-
# Zwilling für die Shard- und Perf-Kontexte (byte-genaue Job-Namen).
# «Vercel» braucht KEINEN Zwilling — die App-Integration meldet sich selbst.
name: CI (Doku-No-op)

on:
  pull_request:
    paths:
      - '**.md'

jobs:
  tore:
    # Job-Name MUSS exakt dem Required-Check-Kontext aus ci.yml entsprechen:
    name: Tore (tsc · Tests · Lint · Build · Checks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Plan-Inventar-Konsistenz (einziger echter Check im Zwilling)
        run: npm run check:plan
      - run: echo "Reine Doku-Änderung — restliche Code-Tore nicht betroffen (Zwilling meldet grün)."

  # Zwilling der Playwright-Shards aus ci.yml (Job `e2e`): dort triggert der
  # Lauf wegen paths-ignore **.md nie, der Required-Kontext bliebe ungemeldet.
  # Job-Namen MÜSSEN exakt «Browser-Smoke Shard X/3 (Playwright)» ergeben —
  # gleiche Matrix (gruppe: [1, 2, 3]) wie in ci.yml.
  e2e:
    name: Browser-Smoke Shard ${{ matrix.gruppe }}/3 (Playwright)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        gruppe: [1, 2, 3]
    steps:
      - run: echo "Reine Doku-Änderung — Browser-Smoke Shard ${{ matrix.gruppe }}/3 nicht betroffen, Zwilling meldet grün."

  # Zwilling von `perf` aus ci.yml — Job-Name exakt der Required-Kontext.
  perf:
    name: Perf-Budget (§15 — nur bei grüner Treue)
    runs-on: ubuntu-latest
    steps:
      - run: echo "Reine Doku-Änderung — Perf-Budget nicht betroffen, Zwilling meldet grün."
