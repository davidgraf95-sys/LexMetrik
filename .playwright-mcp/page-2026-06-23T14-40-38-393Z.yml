                - text: (1953).
              - paragraph [ref=e347]: We, therefore, agree with the District Court that Jane Roe had standing to undertake this litigation, that she presented a justiciable controversy, and that the termination of her 1970 pregnancy has not rendered her case moot.
              - paragraph [ref=e348]:
                - text: B.
                - emphasis [ref=e349]: Dr. Hallford.
                - text: "The doctor’s position is different. He entered Roe’s litigation as a plaintiff-intervenor, alleging in his complaint that he:"
              - blockquote [ref=e350]:
                - text: "“[I]n the past has been arrested for violating the Texas Abortion Laws and at the present time stands charged by indictment with violating said laws in the Criminal District Court of Dallas County, Texas to-wit: (1) The State of Texas vs."
                - link "*126 126" [ref=e351] [cursor=pointer]:
                  - /url: "#126"
                - text: James H. Hallford, No. C-69-5307-IH, and (2) The State of Texas vs. James H. Hallford, No. C-69-2524-H. In both cases the defendant is charged with abortion . . . .”
              - paragraph [ref=e352]: In his application for leave to intervene, the doctor made like representations as to the abortion charges pending in the state court. These representations were also repeated in the affidavit he executed and filed in support of his motion for summary judgment.
              - paragraph [ref=e353]: Dr. Hallford is, therefore, in the position of seeking, in a federal court, declaratory and injunctive relief with respect to the same statutes under which he stands charged in criminal prosecutions simultaneously pending in state court. Although he stated that he has been arrested in the past for violating the State’s abortion laws, he makes no allegation of any substantial and immediate threat to any federally protected right that cannot be asserted in his defense against the state prosecutions. Neither is there any allegation of harassment or bad-faith prosecution. In order to escape the rule articulated in the cases cited in the next paragraph of this opinion that, absent harassment and bad faith, a defendant in a pending state criminal case cannot affirmatively challenge in federal court the statutes under which the State is prosecuting him, Dr. Hallford seeks to distinguish his status as a present state defendant from his status as a “potential future defendant” and to assert only the latter for standing purposes here.
              - paragraph [ref=e354]:
                - text: We see no merit in that distinction. Our decision in
                - emphasis [ref=e355]: Samuels
                - text: v.
