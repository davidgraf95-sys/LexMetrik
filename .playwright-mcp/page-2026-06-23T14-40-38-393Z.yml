              - generic [ref=e1108]:
                - text: "41"
                - paragraph [ref=e1109]: “This Act is based largely upon the New York abortion act following a review of the more recent laws on abortion in several states and upon recognition of a more liberal trend in laws on this subject. Recognition was given also to the several decisions in state and federal courts which show a further trend toward liberalization of abortion laws, especially during the first trimester of pregnancy.
                - blockquote [ref=e1110]:
                  - text: “Recognizing that a number of problems appeared in New York, a shorter time period for ‘unlimited’ abortions was advisable. The
                  - link "*148" [ref=e1111] [cursor=pointer]:
                    - /url: "#148"
                  - text: time period was bracketed to permit the various states to insert a figure more in keeping with the different conditions that might exist among the states. Likewise, the language limiting the place or places in which abortions may be performed was also bracketed to account for different conditions among the states. In addition, limitations on abortions after the initial 'unlimited’ period were placed in brackets so that individual states may adopt all or any of these reasons, or place further restrictions upon abortions after the initial period.
                - blockquote [ref=e1112]: “This Act does not contain any provision relating to medical review committees or prohibitions against sanctions imposed upon medical personnel refusing to participate in abortions because of religious or other similar reasons, or the like. Such provisions, while related, do not directly pertain to when, where, or by whom abortions may be performed; however, the Act is not drafted to exclude such a provision by a state wishing to enact the same.”
