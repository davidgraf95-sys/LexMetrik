              - heading "Dissent by Rehnquist" [level=3] [ref=e1391]
              - separator [ref=e1392]
              - generic [ref=e1396]:
                - generic [ref=e1397]: Mr. Justice Rehnquist,
                - paragraph [ref=e1398]: dissenting.
                - paragraph [ref=e1399]: The Court’s opinion brings to the decision of this troubling question both extensive historical fact and a wealth of legal scholarship. While the opinion thus commands my respect, I find myself nonetheless in fundamental disagreement with those parts of it that invalidate the Texas statute in question, and therefore dissent.
                - paragraph [ref=e1400]: I
                - paragraph [ref=e1401]:
                  - text: The Court’s opinion decides that a State may impose virtually no restriction on the performance of abortions during the first trimester of pregnancy. Our previous decisions indicate that a necessary predicate for such an opinion is a plaintiff who was in her first trimester of pregnancy at some time during the pendency of her lawsuit. While a party may vindicate his own constitutional rights, he may not seek vindication for the rights of others.
                  - emphasis [ref=e1402]: Moose Lodge
                  - text: v.
                  - emphasis [ref=e1403]: Irvis,
                  - link "407 U. S. 163" [ref=e1405] [cursor=pointer]:
                    - /url: /opinion/108572/moose-lodge-no-107-v-irvis/
                  - text: (1972);
                  - emphasis [ref=e1406]: Sierra Club
                  - text: v.
                  - emphasis [ref=e1407]: Morton,
                  - link "405 U. S. 727" [ref=e1409] [cursor=pointer]:
                    - /url: /opinion/108502/sierra-club-v-morton/
                  - text: (1972). The Court’s statement of facts in this case makes clear, however, that the record in no way indicates the presence of such a plaintiff. We know only that plaintiff Roe at the time of filing her complaint was a pregnant woman; for aught that appears in this record, she may have been in her
                  - emphasis [ref=e1410]: last
                  - text: trimester of pregnancy as of the date the complaint was filed.
                - paragraph [ref=e1411]:
                  - text: Nothing in the Court’s opinion indicates that Texas might not constitutionally apply its proscription of abortion as written to a woman in that stage of pregnancy. Nonetheless, the Court uses her complaint against the Texas statute as a fulcrum for deciding that States may
                  - link "*172 172" [ref=e1412] [cursor=pointer]:
                    - /url: "#172"
                  - text: impose virtually no restrictions on medical abortions performed during the
                  - emphasis [ref=e1413]: first
                  - text: trimester of pregnancy. In deciding such a hypothetical lawsuit, the Court departs from the longstanding admonition that it should never “formulate a rule of constitutional law broader than is required by the precise facts to which it is to be applied.”
                  - emphasis [ref=e1414]: Liverpool, New York & Philadelphia S. S. Co.
                  - text: v.
                  - emphasis [ref=e1415]: Commissioners of Emigration,
                  - link "113 U. S. 33, 39" [ref=e1417] [cursor=pointer]:
                    - /url: /opinion/91256/liverpool-new-york-philadelphia-steamship-co-v-commissioners-of/#39
                  - text: (1885). See also
                  - emphasis [ref=e1418]: Ashwander
                  - text: v.
                  - emphasis [ref=e1419]: TVA,
                  - link "297 U. S. 288, 345" [ref=e1421] [cursor=pointer]:
                    - /url: /opinion/102605/ashwander-v-tennessee-valley-authority/#345
                  - text: (1936) (Brandeis, J., concurring).
                - paragraph [ref=e1422]: II
                - paragraph [ref=e1423]:
                  - text: Even if there were a plaintiff in this case capable of litigating the issue which the Court decides, I would reach a conclusion opposite to that reached by the Court. I have difficulty in concluding, as the Court does, that the right of “privacy” is involved in this case. Texas, by the statute here challenged, bars the performance of a medical abortion by a licensed physician on a plaintiff such as Roe. A transaction resulting in an operation such as this is not. “private” in the ordinary usage of that word. Nor is the “privacy” that the Court finds here even a distant relative of the freedom from searches and seizures protected by the Fourth Amendment to the Constitution, which the Court has referred to as embodying a right to privacy.
                  - emphasis [ref=e1424]: Katz
                  - text: v.
                  - emphasis [ref=e1425]: United States,
                  - link "389 U. S. 347" [ref=e1427] [cursor=pointer]:
                    - /url: /opinion/107564/katz-v-united-states/
                  - text: (1967).
                - paragraph [ref=e1428]:
                  - text: If the Court means by the term “privacy” no more than that the claim of a person to be free from unwanted state regulation of consensual transactions may be a form of “liberty” protected by the Fourteenth Amendment, there is no doubt that similar claims have been upheld in our earlier decisions on the basis of that liberty. I agree with the statement of Mr. Justice Stewart in his concurring opinion that the “liberty,” against deprivation of which without due process the Fourteenth
                  - link "*173 173" [ref=e1429] [cursor=pointer]:
                    - /url: "#173"
                  - text: Amendment protects, embraces more than the rights found in the Bill of Rights. But that liberty is not guaranteed absolutely against deprivation, only against deprivation without due process of law. The test traditionally applied in the area of social and economic legislation is whether or not a law such as that challenged has a rational relation to a valid state objective.
                  - emphasis [ref=e1430]: Williamson
                  - text: v.
                  - emphasis [ref=e1431]: Lee Optical Co.,
                  - link "348 U. S. 483, 491" [ref=e1433] [cursor=pointer]:
                    - /url: /opinion/105285/williamson-v-lee-optical-of-oklahoma-inc/#491
                  - text: (1955). The Due Process Clause of the Fourteenth Amendment undoubtedly does place a limit, albeit a broad one, on legislative power to enact laws such as this. If the Texas statute were to prohibit an abortion even where the mother’s life is in jeopardy, I have little doubt that such a statute would lack a rational relation to a valid state objective under the test stated in
                  - emphasis [ref=e1434]:
                    - link "Williamson, supra." [ref=e1436] [cursor=pointer]:
                      - /url: /opinion/105285/williamson-v-lee-optical-of-oklahoma-inc/
                  - text: But the Court’s sweeping' invalidation of any restrictions on abortion during the first trimester is impossible to justify under that standard, and the conscious weighing of competing factors that the Court’s opinion apparently substitutes for the established test is far more appropriate to a legislative judgment than to a judicial one.
                - paragraph [ref=e1437]:
                  - text: The Court eschews the history of the Fourteenth Amendment in its reliance on the “compelling state interest” test. See
                  - emphasis [ref=e1438]: Weber
                  - text: v.
                  - emphasis [ref=e1439]: Aetna Casualty & Surety Co.,
                  - link "406 U. S. 164, 179" [ref=e1441] [cursor=pointer]:
                    - /url: /opinion/108527/weber-v-aetna-casualty-surety-co/#179
                  - text: (1972) (dissenting opinion). But the Court adds a new wrinkle to this test by transposing it from the legal considerations associated with the Equal Protection Clause of the Fourteenth Amendment to this case arising under the Due Process Clause of the Fourteenth Amendment. Unless I misapprehend the consequences of this transplanting of the “compelling state interest test,” the Court’s opinion will accomplish the seemingly impossible feat of leaving this area of the law more confused than it found it.
                - paragraph [ref=e1442]:
                  - link "*174 174" [ref=e1443] [cursor=pointer]:
                    - /url: "#174"
                  - text: While the Court’s opinion quotes from the dissent of Mr. Justice Holmes in
                  - emphasis [ref=e1444]: Lochner
                  - text: v.
                  - emphasis [ref=e1445]: New York,
                  - link "198 U. S. 45, 74" [ref=e1447] [cursor=pointer]:
                    - /url: /opinion/96276/lochner-v-new-york/#74
                  - text: (1905), the result it reaches is more closely attuned to the majority opinion of Mr. Justice Peckham in that case. As in
                  - emphasis [ref=e1448]:
                    - link "Lochner" [ref=e1450] [cursor=pointer]:
                      - /url: /opinion/96276/lochner-v-new-york/
                  - text: and similar cases applying substantive due process standards to economic and social welfare legislation, the adoption of the compelling state interest standard will inevitably require this Court to examine the legislative policies and pass on the wisdom of these policies in the very process of deciding whether a particular state interest put forward may or may not be “compelling.” The decision here to break pregnancy into three distinct terms and to outline the permissible restrictions the State may impose in each one, for example, partakes more of judicial legislation than it does of a determination of the intent of the drafters of the Fourteenth Amendment.
                - paragraph [ref=e1451]:
                  - text: The fact that a majority of the States reflecting, after all, the majority sentiment in those States, have had restrictions on abortions for at least a century is a strong indication, it seems to me, that the asserted right to an abortion is not “so rooted in the traditions and conscience of our people as to be ranked as fundamental,”
                  - emphasis [ref=e1452]: Snyder
                  - text: v.
                  - emphasis [ref=e1453]: Massachusetts,
                  - link "291 U. S. 97, 105" [ref=e1455] [cursor=pointer]:
                    - /url: /opinion/102189/snyder-v-massachusetts/#105
                  - text: (1934). Even today, when society’s views on abortion are changing, the very existence of the debate is evidence that the “right” to an abortion is not so universally accepted as the appellant would have us believe.
                - paragraph [ref=e1456]:
                  - text: To reach its result, the Court necessarily has had to find within the scope of the Fourteenth Amendment a right that was apparently completely unknown to the drafters of the Amendment. As early as 1821, the first state law dealing directly with abortion was enacted by the Connecticut Legislature. Conn. Stat., Tit. 22, §§ 14, 16. By the time of the adoption of the Four
                  - link "*175 175" [ref=e1457] [cursor=pointer]:
                    - /url: "#175"
                  - text: teenth Amendment in 1868, there were at least 36 laws enacted by state or territorial legislatures limiting abortion.1 While many States have amended or updated
                  - link "*176 176" [ref=e1458] [cursor=pointer]:
                    - /url: "#176"
                  - text: their laws, 21 of the laws on the books in 1868 remain in effect today.2 Indeed, the Texas statute struck down today was, as the majority notes, first enacted in 1857
                  - link "*177 177" [ref=e1459] [cursor=pointer]:
                    - /url: "#177"
                  - text: and “has remained substantially unchanged to the present time.”
                  - emphasis [ref=e1460]: Ante,
                  - text: at 119.
                - paragraph [ref=e1461]: There apparently was no question concerning the validity of this provision or of any of the other state statutes when the Fourteenth Amendment was adopted. The only conclusion possible from this history is that the drafters did not intend to have the Fourteenth Amendment withdraw from the States the power to legislate with respect to this matter.
                - paragraph [ref=e1462]: I — I HH ) — H
                - paragraph [ref=e1463]:
                  - text: Even if one were to agree that the case that the Court decides were here, and that the enunciation of the substantive constitutional law in the Court’s opinion were proper, the actual disposition of the case by the Court is still difficult to justify. The Texas statute is struck down
                  - emphasis [ref=e1464]: in toto,
                  - text: even though the Court apparently concedes that at later periods of pregnancy Texas might impose these selfsame statutory limitations on abortion. My understanding of past practice is that a statute found
                  - link "*178 178" [ref=e1465] [cursor=pointer]:
                    - /url: "#178"
                  - text: to be invalid as applied to a particular plaintiff, but not unconstitutional as a whole, is not simply “struck down” but is, instead, declared unconstitutional as applied to the fact situation before the Court.
                  - emphasis [ref=e1466]: Yick Wo
                  - text: v.
                  - emphasis [ref=e1467]: Hopkins,
                  - link "118 U. S. 356" [ref=e1469] [cursor=pointer]:
                    - /url: /opinion/91704/yick-wo-v-hopkins/
                  - text: (1886);
                  - emphasis [ref=e1470]: Street
                  - text: v.
                  - emphasis [ref=e1471]: New York,
                  - link "394 U. S. 576" [ref=e1473] [cursor=pointer]:
                    - /url: /opinion/107900/street-v-new-york/
                  - text: (1969).
                - paragraph [ref=e1474]: For all of the foregoing reasons, I respectfully dissent.
