                - link "262 U. S. 390, 399" [ref=e574] [cursor=pointer]:
                  - /url: /opinion/100233/meyer-v-nebraska/#399
                - text: (1923). These decisions make it clear that only personal rights that can be deemed “fundamental” or “implicit in the concept of ordered liberty,”
                - emphasis [ref=e575]: Palko
