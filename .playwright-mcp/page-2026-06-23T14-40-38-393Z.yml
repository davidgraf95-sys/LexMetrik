              - generic [ref=e1197]:
                - text: "54"
                - paragraph [ref=e1198]:
                  - text: When Texas urges that a fetus is entitled to Fourteenth Amendment protection as a person, it faces a dilemma. Neither in Texas nor in any other State are all abortions prohibited. Despite broad proscription, an exception always exists. The exception contained
                  - link "*158" [ref=e1199] [cursor=pointer]:
                    - /url: "#158"
                  - text: in Art. 1196, for an abortion procured or attempted by medical advice for the purpose of saving the life of the mother, is typical. But if the fetus is a person who is not to be deprived of life without due process of law, and if the mother’s condition is the sole determinant, does not the Texas exception appear to be out of line with the Amendment’s command?
                - paragraph [ref=e1200]:
                  - text: There are other inconsistencies between Fourteenth Amendment status and the typical abortion statute. It has already been pointed out, n. 49,
                  - emphasis [ref=e1201]: supra,
                  - text: that in Texas the woman is not a principal or an accomplice with respect to an abortion upon her. If the fetus is a person, why is the woman not a principal or an accomplice? Further, the penalty for criminal abortion specified by Art. 1195 is significantly less than the maximum penalty for murder prescribed by Art. 1257 of the Texas Penal Code. If the fetus is a person, may the penalties be different?
