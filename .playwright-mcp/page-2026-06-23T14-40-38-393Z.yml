                    - /url: /opinion/106576/ferguson-v-skrupa/
                  - text: ", purported to sound the death knell for the doctrine of substantive due process, a doctrine under which many-state laws had in the past been held to violate the Fourteenth Amendment. As Mr. Justice Black’s opinion for the Court in"
                  - emphasis [ref=e1246]:
                    - link "Skrupa" [ref=e1248] [cursor=pointer]:
                      - /url: /opinion/106576/ferguson-v-skrupa/
                  - text: "put it: “We have returned to the original constitutional proposition that courts do not substitute their social and economic beliefs for the judgment of legislative bodies, who are elected to pass laws.”"
                  - link "Id., at 730" [ref=e1250] [cursor=pointer]:
                    - /url: /opinion/106576/ferguson-v-skrupa/#730
                    - emphasis [ref=e1251]: Id.,
                    - text: at 730
                  - text: ".1"
                - paragraph [ref=e1252]:
                  - text: Barely two years later, in
                  - emphasis [ref=e1253]: Griswold
                  - text: v.
                  - emphasis [ref=e1254]: Connecticut,
                  - link "381 U. S. 479" [ref=e1256] [cursor=pointer]:
                    - /url: /opinion/107082/griswold-v-connecticut/
                  - text: ", the Court held a Connecticut birth control law unconstitutional. In view of what had been so recently said in"
                  - emphasis [ref=e1257]:
                    - link "Skrupa" [ref=e1259] [cursor=pointer]:
                      - /url: /opinion/106576/ferguson-v-skrupa/
                    - text: ","
                  - text: the Court’s opinion in
                  - emphasis [ref=e1260]:
                    - link "Griswold" [ref=e1262] [cursor=pointer]:
                      - /url: /opinion/107082/griswold-v-connecticut/
                  - text: understandably did its best to avoid reliance on the Due Process Clause of the Fourteenth Amendment as the ground for decision. Yet, the Connecticut law did not violate any provision of the Bill of Rights, nor any other specific provision of the Constitution.2 So it was clear
                  - link "*168 168" [ref=e1263] [cursor=pointer]:
                    - /url: "#168"
                  - text: to me then, and it is equally clear to me now, that the
                  - emphasis [ref=e1264]:
                    - link "Griswold" [ref=e1266] [cursor=pointer]:
                      - /url: /opinion/107082/griswold-v-connecticut/
                  - text: decision can be rationally understood only as a holding that the Connecticut statute substantively invaded the “liberty” that is protected by the Due Process Clause of the Fourteenth Amendment.3 As so understood,
                  - emphasis [ref=e1267]:
                    - link "Griswold" [ref=e1269] [cursor=pointer]:
                      - /url: /opinion/107082/griswold-v-connecticut/
                  - text: stands as one in a long line of
                  - emphasis [ref=e1270]: pre-Skrupa
                  - text: cases decided under the doctrine of substantive due process, and I now accept it as such.
                - paragraph [ref=e1271]:
