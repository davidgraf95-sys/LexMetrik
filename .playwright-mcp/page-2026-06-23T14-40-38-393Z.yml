              - paragraph [ref=e726]: In the recent abortion cases, cited above, courts have recognized these principles. Those striking down state laws have generally scrutinized the State’s interests in protecting health and potential life, and have concluded that neither interest justified broad limitations on the reasons for which a physician and his pregnant patient might decide that she should have an abortion in the early stages of pregnancy. Courts sustaining state laws have held that the State’s determinations to protect health or prenatal life are dominant and constitutionally justifiable.
              - paragraph [ref=e727]: IX
              - paragraph [ref=e728]:
                - text: The District Court held that the appellee failed to meet his burden of demonstrating that the Texas statute’s infringement upon Roe’s rights was necessary to support a compelling state interest, and that, although the appellee presented “several compelling justifications for state presence in the area of abortions,” the statutes outstripped these justifications and swept “far beyond any areas of compelling state interest.”
                - link "314 F. Supp., at 1222-1223" [ref=e730] [cursor=pointer]:
                  - /url: /opinion/1472349/roe-v-wade/#1222
                - text: . Appellant and appellee both contest that holding. Appellant, as has been indicated, claims an absolute right that bars any state imposition of criminal penalties in the area. Appel-lee argues that the State’s determination to recognize and protect prenatal life from and after conception constitutes a compelling state interest. As noted above, we do not agree fully with either formulation.
              - paragraph [ref=e731]:
                - text: A. The appellee and certain
                - emphasis [ref=e732]: amici
                - text: argue that the fetus is a “person” within the language and meaning of the Fourteenth Amendment. In support of this, they outline at length and in detail the well-known facts of fetal development. If this suggestion of personhood is established, the appellant’s case, of course, collapses,
                - link "*157 157" [ref=e733] [cursor=pointer]:
                  - /url: "#157"
                - text: for the fetus’ right to life would then be guaranteed specifically by the Amendment. The appellant conceded as much on reargument:51 On the other hand, the appellee conceded on reargument52 that no case could be cited that holds that a fetus is a person within the meaning of the Fourteenth Amendment.
              - paragraph [ref=e734]: "The Constitution does not define “person” in so many words. Section 1 of the Fourteenth Amendment contains three references to “person.” The first, in defining “citizens,” speaks of “persons born or naturalized in the United States.” The word also appears both in the Due Process Clause and in the Equal Protection Clause. “Person” is used in other places in the Constitution: in the listing of qualifications for Representatives and Senators, Art. I, § 2, cl. 2, and § 3, cl. 3; in the Apportionment Clause, Art. I, § 2, cl. 3; 53 in the Migration and Importation provision, Art. I, § 9, cl. 1; in the Emolument Clause, Art. I, § 9, cl. 8; in the Electors provisions, Art. II, § 1, cl. 2, and the superseded cl. 3; in the provision outlining qualifications for the office of President, Art. II, § 1, cl. 5; in the Extradition provisions, Art. IV, § 2, cl. 2, and the superseded Fugitive Slave Clause 3; and in the Fifth, Twelfth, and Twenty-second Amendments, as well as in §§ 2 and 3 of the Fourteenth Amendment. But in nearly all these instances, the use of the word is such that it has application only postnatally. None indicates, with any assurance, that it has any possible pre-natal application.54"
              - paragraph [ref=e735]:
                - link "*158 158" [ref=e736] [cursor=pointer]:
                  - /url: "#158"
                - text: All this, together with our observation,
                - emphasis [ref=e737]: supra,
                - text: that throughout the major portion of the 19th century prevailing legal abortion practices were far freer than they are today, persuades us that the word “person,” as used in the Fourteenth Amendment, does not include the unborn.55 This is in accord with the results reached in those few cases where the issue has been squarely presented.
