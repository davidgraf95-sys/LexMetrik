                - paragraph [ref=e1073]: "Fourteen States have adopted some form of the ALI statute. See Ark. Stat. Ann. §§ 41-303 to 41-310 (Supp. 1971); Calif. Health & Safety Code §§ 25950-25955.5 (Supp. 1972); Colo. Rev. Stat. Ann. §§40-2-50 to 40-2-53 (Cum. Supp. 1967); Del. Code Ann., Tit. 24, §§ 1790-1793 (Supp. 1972); Florida Law of Apr. 13, 1972, c. 72-196, 1972 Fla. Sess. Law Serv., pp. 380-382; Ga. Code §§26-1201 to 26-1203 (1972); Kan. Stat. Ann. §21-3407 (Supp. 1971); Md. Ann. Code, Art. 43, §§ 137-139 (1971); Miss. Code Ann. § 2223 (Supp. 1972); N. M. Stat. Ann. §§ 40A-5-1 to 40A-5-3 (1972); N. C. Gen. Stat. § 14^45.1 (Supp. 1971); Ore. Rev. Stat. §§ 435.405 to 435.495 (1971); S. C. Code Ann. §§ 16-82 to 16-89 (1962 and Supp. 1971); Va. Code Ann. §§ 18.1-62 to 18.1-62.3 (Supp. 1972). Mr. Justice Clark described some of these States as having “led the way.” Religion, Morality, and Abortion: A Constitutional Appraisal, 2 Loyola U. (L. A.) L. Rev. 1, 11 (1969)."
                - paragraph [ref=e1074]: By the end of 1970, four other States had repealed criminal penalties for abortions performed in early pregnancy by a licensed physician, subject to stated procedural and health requirements. Alaska Stat. § 11.15.060 (1970); Haw. Rev. Stat. §453-16 (Supp. 1971); N. Y. Penal Code § 125.05, subd. 3 (Supp. 1972 — 1973) ; Wash. Rev. Code §§9.02.060 to 9.02.080 (Supp. 1972). The precise status of criminal abortion laws in some States is made unclear by recent decisions in state and federal courts striking down existing state laws, in whole or in part.
                - text: ↵
              - generic [ref=e1075]:
                - text: "38"
                - paragraph [ref=e1076]:
                  - text: “Whereas, Abortion, like any other medical procedure, should not be performed when contrary to the best interests of the patient
                  - link "*144" [ref=e1077] [cursor=pointer]:
                    - /url: "#144"
                  - text: since good medical practice requires due' consideration for the patient’s welfare and not mere acquiescence to the patient’s demand; and
                - blockquote [ref=e1078]: “Whereas, The standards of sound clinical judgment, which, together with informed patient consent should be determinative according to the merits of each individual case; therefore be it
                - blockquote [ref=e1079]:
                  - emphasis [ref=e1080]: “RESOLVED,
                  - text: That abortion is a medical procedure and should be performed only by a duly licensed physician and surgeon in an accredited hospital acting only after consultation with two other physicians chosen because of their professional competency and in conformance with standards of good medical practice and the Medical Practice Act of his State; and be it further
                - blockquote [ref=e1081]:
                  - emphasis [ref=e1082]: “RESOLVED,
                  - text: That no physician or other professional personnel shall be compelled to perform any act which violates his good medical judgment. Neither physician, hospital, nor hospital personnel shall be required to perform any act violative of personally-held moral principles. In these circumstances good medical practice requires only that the physician or other professional personnel withdraw from the case so long as the withdrawal is consistent with good medical practice.” Proceedings of the AMA House of Delegates 220 (June 1970).
                - text: ↵
              - generic [ref=e1083]:
                - text: "39"
                - paragraph [ref=e1084]: “The Principles of Medical Ethics of the AMA do not prohibit a physician from performing an abortion that is performed in accordance with good medical practice and under circumstances that do not violate the laws of the community in which he practices.
                - blockquote [ref=e1085]: “In the matter of abortions, as of any other medical procedure, the Judicial Council becomes involved whenever there is alleged violation of the Principles of Medical Ethics as established by the House of Delegates.”
