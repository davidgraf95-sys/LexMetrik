                - link "302 U. S. 319, 325" [ref=e578] [cursor=pointer]:
                  - /url: /opinion/102879/palko-v-connecticut/#325
                - text: (1937), are included in this guarantee of personal privacy. They also make it clear that the right has some extension to activities relating to marriage,
                - emphasis [ref=e579]: Loving
