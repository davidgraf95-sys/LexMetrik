                    - /url: "#133"
                  - text: "York Concerning Abortion and the Status of the Foetus, 1664-1968: A Case of Cessation of Constitutionality (pt. 1), 14 N. Y. L. F. 411, 418-428 (1968) (hereinafter Means I); Stern, Abortion: Reform and the Law, 59 J. Crim. L. C. & P. S. 84 (1968) (hereinafter Stern); Quay 430-432; Williams 152."
                - text: ↵
              - generic [ref=e958]:
                - text: "22"
                - paragraph [ref=e959]: "Early philosophers believed that the embryo or fetus did not become formed and begin to live until at least 40 days after conception for a male, and 80 to 90 days for a female. See, for example, Aristotle, Hist. Anim. 7.3.583b; Gen. Anim. 2.3.736, 2.5.741; Hippocrates, Lib. de Nat. Puer., No. 10. Aristotle’s thinking derived from his three-stage theory of life: vegetable, animal, rational. The vegetable stage was reached at conception, the animal at “animation,” and the rational soon after live birth. This theory, together with the 40/80 day view, came to be accepted by early Christian thinkers."
                - paragraph [ref=e960]:
                  - text: The theological debate was reflected in the writings of St. Augustine, who made a distinction between
                  - emphasis [ref=e961]: embryo inanimatus,
                  - text: not yet endowed with a soul, and
                  - emphasis [ref=e962]: embryo animatus.
                  - text: He may have drawn upon Exodus 21:22. At one point, however, he expressed the view that human powers cannot determine the point during fetal development at which the critical change occurs. See Augustine, De Origine Animae 4.4 (Pub. Law 44.527). See also W. Reany, The Creation of the Human Soul, c. 2 and 83-86 (1932); Huser, The Crime of Abortion in Canon Law 15 (Catholic Univ. of America, Canon Law Studies No. 162, Washington, D. C., 1942).
                - paragraph [ref=e963]:
                  - text: Galen, in three treatises related to embryology, accepted the thinking of Aristotle and his followers. Quay 426-427. Later, Augustine on abortion was incorporated by Gratian into the Decretum, published about 1140. Decretum Magistri Gratiani 2.32.2.7 to 2.32.2.10,
                  - link "*134" [ref=e964] [cursor=pointer]:
                    - /url: "#134"
                  - text: in 1 Corpus Juris Canonici 1122, 1123 (A. Friedburg, 2d ed. 1879). This Decretal and the Decretals that followed were recognized as the definitive body of canon law until the new Code of 1917.
                - paragraph [ref=e965]: "For discussions of the canon-law treatment, see Means I, pp. 411-412; Noonan 20-26; Quay 426-430; see also J. Noonan, Contraception: A History of Its Treatment by the Catholic Theologians and Canonists 18-29 (1965)."
                - text: ↵
              - generic [ref=e966]:
                - text: "23"
                - paragraph [ref=e967]: Bracton took the position that abortion by blow or poison was homicide “if the foetus be already formed and animated, and particularly if it be animated.” 2 II. Bracton, De Legibus et Con-suetudinibus Angliae 279 (T. Twiss ed. 1879), or, as a later translation puts it, “if the foetus is already formed or quickened, especially if it is quickened,” 2 H. Bracton, On the Laws and Customs of England 341 (S. Thorne ed. 1968). See Quay 431; see also 2 Fleta 60-61 (Book 1, c. 23) (Selden Society ed. 1955).
