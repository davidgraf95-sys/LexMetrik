                  - link "*169 169" [ref=e1317] [cursor=pointer]:
                    - /url: "#169"
                  - text: "As Mr. Justice Harlan once wrote: “[T]he full scope of the liberty guaranteed by the Due Process Clause cannot be found in or limited by the precise terms of the specific guarantees elsewhere provided in the Constitution. This ‘liberty’ is not a series of isolated points pricked out in terms of the taking of property; the freedom of speech, press, and religion; the right to keep and bear arms; the freedom from unreasonable searches and seizures; and so on. It is a rational continuum which, broadly speaking, includes a freedom from all substantial arbitrary impositions and purposeless restraints . . . and which also recognizes, what a reasonable and sensitive judgment must, that certain interests require particularly careful scrutiny of the state needs asserted to justify their abridgment.”"
                  - emphasis [ref=e1318]: Poe
                  - text: v.
                  - emphasis [ref=e1319]: Ullman,
                  - link "367 U. S. 497, 543" [ref=e1321] [cursor=pointer]:
                    - /url: /opinion/106282/poe-v-ullman/#543
                  - text: (opinion dissenting from dismissal of appeal) (citations omitted). In the words of Mr. Justice Frankfurter, “Great concepts like . . . ‘liberty’ . . . were purposely left to gather meaning from experience. For they relate to the whole domain of social and economic fact, and the statesmen who founded this Nation knew too well that only a stagnant society remains unchanged.”
                  - emphasis [ref=e1322]: National Mutual Ins. Co.
                  - text: v.
                  - emphasis [ref=e1323]: Tidewater Transfer Co.,
                  - link "337 U. S. 582, 646" [ref=e1325] [cursor=pointer]:
                    - /url: /opinion/104697/national-mutual-insurance-v-tidewater-transfer-co/#646
                  - text: (dissenting opinion).
                - paragraph [ref=e1326]:
                  - text: Several decisions of this Court make clear that freedom of personal choice in matters of marriage and family life is one of the liberties protected by the Due Process Clause of the Fourteenth Amendment.
                  - emphasis [ref=e1327]: Loving
                  - text: v.
                  - emphasis [ref=e1328]: Virginia,
                  - link "388 U. S. 1, 12" [ref=e1330] [cursor=pointer]:
                    - /url: /opinion/107480/loving-v-virginia/#12
                  - text: ;
                  - emphasis [ref=e1331]: Griswold
                  - text: v.
                  - emphasis [ref=e1332]:
                    - link "Connecticut, supra;" [ref=e1334] [cursor=pointer]:
                      - /url: /opinion/107082/griswold-v-connecticut/
                    - text: Pierce
                  - text: v.
                  - emphasis [ref=e1335]:
                    - text: Society of
                    - link "Sisters, supra;" [ref=e1337] [cursor=pointer]:
                      - /url: /opinion/100694/pierce-v-society-of-sisters/
                    - text: Meyer
                  - text: v.
                  - emphasis [ref=e1338]:
                    - link "Nebraska, supra." [ref=e1340] [cursor=pointer]:
                      - /url: /opinion/100233/meyer-v-nebraska/
                  - text: See also
                  - emphasis [ref=e1341]: Prince
                  - text: v.
                  - emphasis [ref=e1342]: Massachusetts,
                  - link "321 U. S. 158, 166" [ref=e1344] [cursor=pointer]:
                    - /url: /opinion/103933/prince-v-massachusetts/#166
                  - text: ;
                  - emphasis [ref=e1345]: Skinner
                  - text: v.
                  - emphasis [ref=e1346]: Oklahoma,
                  - link "316 U. S. 535, 541" [ref=e1348] [cursor=pointer]:
                    - /url: /opinion/103701/skinner-v-oklahoma-ex-rel-williamson/#541
                  - text: . As recently as last Term, in
                  - emphasis [ref=e1349]: Eisenstadt
                  - text: v.
                  - emphasis [ref=e1350]: Baird,
                  - link "405 U. S. 438, 453" [ref=e1352] [cursor=pointer]:
                    - /url: /opinion/108489/eisenstadt-v-baird/#453
                  - text: ", we recognized “the right of the"
                  - emphasis [ref=e1353]: individual,
                  - text: married or single, to be free from unwarranted governmental intrusion into matters so fundamentally affecting a person
                  - link "*170 170" [ref=e1354] [cursor=pointer]:
                    - /url: "#170"
                  - text: as the decision whether to bear or beget a child.” That right necessarily includes the right of a woman to decide whether or not to terminate her pregnancy. “Certainly the interests of a woman in giving of her physical and emotional self during pregnancy and the interests that will be affected throughout her life by the birth and raising of a child are of a far greater degree of significance and personal intimacy than the right to send a child to private school protected in Pierce v. Society of Sisters,
                  - link "268 U. S. 510" [ref=e1356] [cursor=pointer]:
                    - /url: /opinion/100694/pierce-v-society-of-sisters/
                  - text: (19250, or the right to teach a foreign language protected in Meyer v. Nebraska,
                  - link "262 U. S. 390" [ref=e1358] [cursor=pointer]:
                    - /url: /opinion/100233/meyer-v-nebraska/
                  - text: (1923).”
                  - emphasis [ref=e1359]: Abele
                  - text: v.
                  - emphasis [ref=e1360]: Markle,
                  - link "351 F. Supp. 224, 227" [ref=e1362] [cursor=pointer]:
                    - /url: /opinion/2594895/abele-v-markle/#227
                  - text: (Conn. 1972).
                - paragraph [ref=e1363]: Clearly, therefore, the Court today is correct in holding that the right asserted by Jane Roe is embraced within the personal liberty protected by the Due Process Clause of the Fourteenth Amendment.
                - paragraph [ref=e1364]: It is evident that the Texas abortion statute infringes that right directly. Indeed, it is difficult to imagine a more complete abridgment of a constitutional freedom than that worked by the inflexible criminal statute now in force in Texas. The question then becomes whether the state interests advanced to justify this abridgment can survive the “particularly careful scrutiny” that the Fourteenth Amendment here requires.
                - paragraph [ref=e1365]:
                  - text: The asserted state interests are protection of the health and safety of the pregnant woman, and protection of the potential future human life within her. These are legitimate objectives, amply sufficient to permit a State to regulate abortions as it does other surgical procedures, and perhaps sufficient to permit a State to regulate abortions more stringently or even to prohibit them in the late stages of pregnancy. But such legislation is not before us, and I think the Court today has thoroughly demonstrated that these state interests cannot constitutionally support the broad abridgment of per
                  - link "*171 171" [ref=e1366] [cursor=pointer]:
                    - /url: "#171"
                  - text: sonal liberty worked by the existing Texas law. Accordingly, I join the Court’s opinion holding that that law is invalid under the Due Process Clause of the Fourteenth Amendment.
                - generic [ref=e1367]:
                  - text: "1"
                  - paragraph [ref=e1368]:
                    - text: Only Mr. Justice Harlan failed to join the Court’s opinion,
                    - link "372 U. S., at 733" [ref=e1370] [cursor=pointer]:
                      - /url: /opinion/106576/ferguson-v-skrupa/#733
                    - text: .
                  - text: ↵
                - generic [ref=e1371]:
                  - text: "2"
                  - paragraph [ref=e1372]:
                    - text: There is no constitutional right of privacy, as such. “ [The Fourth] Amendment protects individual privacy against certain kinds of governmental intrusion, but its protections go further, and often have nothing to do with privacy at all. Other provisions of
                    - link "*168" [ref=e1373] [cursor=pointer]:
                      - /url: "#168"
                    - text: the Constitution protect personal privacy from other forms of governmental invasion. But the protection of a person’s
                    - emphasis [ref=e1374]: general
                    - text: right to privacy — his right to be let alone by other people — is, like the protection of his property and of his very life, left largely to the law of the individual States.”
                    - emphasis [ref=e1375]: Katz
                    - text: v.
                    - emphasis [ref=e1376]: United States,
                    - link "389 U. S. 347, 350-351" [ref=e1378] [cursor=pointer]:
                      - /url: /opinion/107564/katz-v-united-states/#350
                    - text: (footnotes omitted).
                  - text: ↵
                - generic [ref=e1379]:
                  - text: "3"
                  - paragraph [ref=e1380]:
                    - text: This was also clear to Mr. Justice Black,
                    - link "381 U. S., at 507" [ref=e1382] [cursor=pointer]:
                      - /url: /opinion/107082/griswold-v-connecticut/#507
                    - text: (dissenting opinion); to Mr. Justice Harlan,
                    - link "381 U. S., at 499" [ref=e1384] [cursor=pointer]:
                      - /url: /opinion/107082/griswold-v-connecticut/#499
                    - text: (opinion concurring in the judgment); and to Mr. Justice White,
                    - link "381 U. S., at 502" [ref=e1386] [cursor=pointer]:
                      - /url: /opinion/107082/griswold-v-connecticut/#502
                    - text: (opinion concurring in the judgment). See also Mr. Justice Harlan’s thorough and thoughtful opinion dissenting from dismissal of the appeal in
                    - emphasis [ref=e1387]: Poe
                    - text: v.
                    - emphasis [ref=e1388]: Ullman,
                    - link "367 U. S. 497, 522" [ref=e1390] [cursor=pointer]:
                      - /url: /opinion/106282/poe-v-ullman/#522
                    - text: .
