                - text: 465 (White, J., concurring in result); family relationships,
                - emphasis [ref=e595]: Prince
                - text: v.
                - emphasis [ref=e596]: Massachusetts,
                - link "321 U. S. 158, 166" [ref=e598] [cursor=pointer]:
                  - /url: /opinion/103933/prince-v-massachusetts/#166
                - text: (1944) ; and child rearing and education,
                - emphasis [ref=e599]: Pierce
                - text: v.
                - emphasis [ref=e600]: Society of Sisters,
                - link "268 U. S. 510, 535" [ref=e602] [cursor=pointer]:
                  - /url: /opinion/100694/pierce-v-society-of-sisters/#535
                - text: (1925),
                - emphasis [ref=e603]: Meyer
                - text: v.
                - emphasis [ref=e604]:
                  - link "Nebraska, supra." [ref=e606] [cursor=pointer]:
                    - /url: /opinion/100233/meyer-v-nebraska/
              - paragraph [ref=e607]: This right of privacy, whether it be founded in the Fourteenth Amendment’s concept of personal liberty and restrictions upon state action, as we feel it is, or, as the District Court determined, in the Ninth Amendment’s reservation of rights to the people, is broad enough to encompass a woman’s decision whether or not to terminate her pregnancy. The detriment that the State would impose upon the pregnant woman by denying this choice altogether is apparent. Specific and direct harm medically diagnosable even in early pregnancy may be involved. Maternity, or additional offspring, may force upon the woman a distressful life and future. Psychological harm may be imminent. Mental and physical health may be taxed by child care. There is also the distress, for all concerned, associated with the unwanted child, and there is the problem of bringing a child into a family already unable, psychologically and otherwise, to care for it. In other cases, as in this one, the additional difficulties and continuing stigma of unwed motherhood may be involved. All these are factors the woman and her responsible physician necessarily will consider in consultation.
              - paragraph [ref=e608]:
                - text: On the basis of elements such as these, appellant and some
                - emphasis [ref=e609]: amici
                - text: argue that the woman’s right is absolute and that she is entitled to terminate her. pregnancy at whatever time, in whatever way,- and for whatever reason she alone chooses. With this we do not agree. Appellant’s arguments that Texas either has no valid interest at all in regulating the abortion decision, or no interest strong enough to support any limitation upon the woman’s sole determination, are unpersuasive. The
                - link "*154 154" [ref=e610] [cursor=pointer]:
                  - /url: "#154"
                - text: Court’s decisions recognizing a right of privacy also acknowledge that some state regulation in areas protected by that right is appropriate. As noted above, a State may properly assert important interests in safeguarding health, in maintaining medical standards, and in protecting potential life. At some point in pregnancy, these respective interests become sufficiently compelling to sustain regulation of the factors that govern the abortion decision. The privacy right involved, therefore, cannot be said to be absolute. In fact, it is not clear to us that the claim asserted by some
                - emphasis [ref=e611]: amici
                - text: that one has an unlimited right to do with one’s body as one pleases bears a close relationship to the right of privacy previously articulated in the Court’s decisions. The Court has refused to recognize an unlimited right of this kind in the past.
                - emphasis [ref=e612]: Jacobson
                - text: v.
                - emphasis [ref=e613]: Massachusetts,
                - link "197 U. S. 11" [ref=e615] [cursor=pointer]:
                  - /url: /opinion/96230/jacobson-v-massachusetts/
                - text: (1905) (vaccination);
                - emphasis [ref=e616]: Buck
                - text: v.
                - emphasis [ref=e617]: Bell,
                - link "274 U. S. 200" [ref=e619] [cursor=pointer]:
                  - /url: /opinion/101076/buck-v-bell/
                - text: (1927) (sterilization).
              - paragraph [ref=e620]: We, therefore, conclude that the right of personal privacy includes the abortion decision, but that this right is not unqualified and must be considered against important state interests in regulation.
              - paragraph [ref=e621]:
                - text: We note that those federal and state courts that have recently considered abortion law challenges have reached the same conclusion. A majority, in addition to the District Court in the present case, have held state laws unconstitutional, at least in part, because of vagueness or because of overbreadth and abridgment of rights.
