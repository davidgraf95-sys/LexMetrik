          - heading "Lead Opinion by Blackmun" [level=3] [ref=e214]
          - separator [ref=e215]
          - generic [ref=e216]:
            - generic [ref=e219]:
              - generic [ref=e220]:
                - link "*116 116" [ref=e221] [cursor=pointer]:
                  - /url: "#116"
                - text: Mr. Justice Blackmun
              - paragraph [ref=e222]: delivered the opinion of the Court.
              - paragraph [ref=e223]:
                - text: This Texas federal appeal and its Georgia companion,
                - emphasis [ref=e224]: Doe
                - text: v.
                - emphasis [ref=e225]: Bolton, post,
                - text: p. 179, present constitutional challenges to state criminal abortion legislation. The Texas statutes under attack here are typical of those that have been in effect in many States for approximately a century. The Georgia statutes, in contrast, have a modern cast and are a legislative product that, to an extent at least, obviously reflects the influences of recent attitudinal change, of advancing medical knowledge and techniques, and of new thinking about an old issue.
              - paragraph [ref=e226]: We. forthwith acknowledge our awareness of the sensitive and emotional nature of the abortion controversy, of the vigorous opposing views, even among physicians, and of the deep and seemingly absolute convictions that the subject inspires. One’s philosophy, one’s experiences, one’s exposure to the raw edges of human existence, one’s religious training, one’s attitudes toward life and family and their values, and the moral standards one establishes and seeks to observe, are all likely to influence and to color one’s thinking and conclusions about abortion.
              - paragraph [ref=e227]: In addition, population growth, pollution, poverty, and racial overtones tend to complicate and not to simplify the problem.
              - paragraph [ref=e228]:
                - text: Our task, of course, is to resolve the issue by constitutional measurement, free of emotion and of predilection. We seek earnestly to do- this, and, because we do, we
                - link "*117 117" [ref=e229] [cursor=pointer]:
                  - /url: "#117"
                - text: have inquired into, and in this opinion place some emphasis upon, medical and medical-legal history and what that history reveals about man’s attitudes toward the abortion procedure over the centuries. We bear in mind, too, Mr. Justice Holmes’ admonition in his now-vindicated dissent in
                - emphasis [ref=e230]: Lochner
                - text: v.
                - emphasis [ref=e231]: New York,
                - link "198 U. S. 45, 76" [ref=e233] [cursor=pointer]:
                  - /url: /opinion/96276/lochner-v-new-york/#76
                - text: "(1905):"
              - blockquote [ref=e234]: “[The Constitution] is made for people of fundamentally differing views, and the accident of our finding certain opinions natural and familiar or novel and even shocking ought not to conclude our judgment upon the question whether statutes embodying them conflict with the Constitution of the United States.”
              - paragraph [ref=e235]: I
              - paragraph [ref=e236]:
                - text: The Texas statutes that concern us here are Arts. 1191-1194 and 1196 of the State’s Penal Code.1 These make it a crime to “procure an abortion,” as therein
                - link "*118 118" [ref=e237] [cursor=pointer]:
                  - /url: "#118"
                - text: defined, or to attempt one, except with respect to “an abortion procured or attempted by medical advice for the purpose of saving the life of the mother.” Similar statutes are in existence in a majority of the States.2
              - paragraph [ref=e238]:
                - link "*119 119" [ref=e239] [cursor=pointer]:
                  - /url: "#119"
                - text: Texas first enacted a criminal abortion statute in 1854. Texas Laws 1854, c. 49, § 1, set forth in 3 H. Gammel, Laws of Texas 1502 (1898). This was soon modified into language that has remained substantially unchanged to the present time. See Texas Penal Code of 1857, c. 7, Arts. 531-536; G. Paschal, Laws of Texas, Arts. 2192-2197 (1866); Texas Rev. Stat., c. 8, Arts. 536-541 (1879); Texas Rev. Crim. Stat., Arts. 1071-1076 (1911). The final article in each of these compilations provided the same exception, as does the present Article 1196, for an abortion by “medical advice for the purpose of saving the life of the mother.” 3
              - paragraph [ref=e240]:
                - link "*120 120" [ref=e241] [cursor=pointer]:
                  - /url: "#120"
                - text: HH h — I
              - paragraph [ref=e242]: Jane Roe,4 a single woman who was residing m Dallas County, Texas, instituted this federal action in March 1970 against the District Attorney of the county. She sought a declaratory judgment that the Texas criminal abortion statutes were unconstitutional on their face, and an injunction restraining the defendant from enforcing the statutes.
              - paragraph [ref=e243]: Roe alleged that she was unmarried and pregnant; that she wished to terminate her pregnancy by an abortion “performed by a competent, licensed physician, under safe, clinical conditions”; that she was unable to get a “legal” abortion in Texas because her life did not appear to be threatened by the continuation of her pregnancy; and that she could not afford to travel to another jurisdiction in order to secure a legal abortion under safe conditions. She claimed that the Texas statutes were unconstitutionally vague and that they abridged her right of personal privacy, protected by the First, Fourth, Fifth, Ninth, and Fourteenth Amendments. By an amendment to her complaint Roe purported to sue “on behalf of herself and all other women” similarly situated.
              - paragraph [ref=e244]:
                - text: James Hubert Hallford, a licensed physician, sought and was granted leave to intervene in Roe’s action. In his complaint he alleged that he had been arrested previously for violations of the Texas abortion statutes and
                - link "*121 121" [ref=e245] [cursor=pointer]:
                  - /url: "#121"
                - text: that two such prosecutions were pending against him. He described conditions of patients who came to him seeking abortions, and he claimed that for many cases he, as a physician, was unable to determine whether they fell within or outside the exception recognized by Article 1196. He alleged that, as a consequence, the statutes were vague and uncertain, in violation of the Fourteenth Amendment, and that they violated his own and his patients’ rights to privacy in the doctor-patient relationship and his own right to practice medicine, rights he claimed were guaranteed by the First, Fourth, Fifth, Ninth, and Fourteenth Amendments.
              - paragraph [ref=e246]: John and Mary Doe,5 a married couple, filed a companion complaint to that of Roe. They also named the District Attorney as defendant, claimed like constitutional deprivations, and sought declaratory and injunc-tive relief. The Does alleged that they were a childless couple; that Mrs. Doe was suffering from a “neural-chemical” disorder; that her physician had “advised her to avoid pregnancy until such time as her condition has materially improved” (although a pregnancy at the present time would not present “a serious risk” to her life); that, pursuant to medical advice, she had discontinued use of birth control pills; and that if she should become pregnant, she would want to terminate the pregnancy by an abortion performed by a competent, licensed physician under safe, clinical conditions. By an amendment to their complaint, the Does purported to sue “on behalf of themselves and all couples similarly situated.”
              - paragraph [ref=e247]:
                - text: The two actions were consolidated and heard together by a duly convened three-judge district court. The suits thus presented the situations of the pregnant single woman, the childless couple, with the wife not pregnant,
                - link "*122 122" [ref=e248] [cursor=pointer]:
                  - /url: "#122"
                - text: and the licensed practicing physician, all joining in the attack on the Texas criminal abortion statutes. Upon the filing of affidavits, motions were made for dismissal and for summary judgment. The court held that Roe and members of her class, and Dr. Hallford, had standing to sue and presented justiciable controversies, but that the Does had failed to allege facts sufficient to state a present controversy and did not have standing. It concluded that, with respect to the requests for a declaratory judgment, abstention was not warranted. On the merits, the District Court held that the “fundamental right of single women and married persons to choose whether to have children is protected by the Ninth Amendment, through the Fourteenth Amendment,” and that the Texas criminal abortion statutes were void on their face because they were both unconstitutionally vague and constituted an overbroad infringement of the plaintiffs’ Ninth Amendment rights. The court then held that abstention was warranted with respect to the requests for an injunction. It therefore dismissed the Does’ complaint, declared the abortion statutes void, and dismissed the application for injunctive relief.
                - link "314 F. Supp. 1217, 1225" [ref=e250] [cursor=pointer]:
                  - /url: /opinion/1472349/roe-v-wade/#1225
                - text: (ND Tex. 1970).
              - paragraph [ref=e251]:
                - text: The plaintiffs Roe and Doe and the intervenor Hall-ford, pursuant to 28 U. S. C. § 1253, have appealed to this Court from that part of the District Court’s judgment denying the injunction. The defendant District Attorney has purported to cross-appeal, pursuant to the same statute, from the court’s grant of declaratory relief to Roe and Hallford. Both sides also have taken protective appeals to the United States Court of Appeals for the Fifth Circuit. That court ordered the appeals held in abeyance pending decision here. We postponed decision on jurisdiction to the hearing on the merits.
                - link "402 U. S. 941" [ref=e253] [cursor=pointer]:
                  - /url: /c/U.%20S./402/941/
                - text: (1971).
              - paragraph [ref=e254]:
                - link "*123 123" [ref=e255] [cursor=pointer]:
                  - /url: "#123"
                - text: hH
              - paragraph [ref=e256]:
                - text: It might have been preferable if the defendant, pursuant to our Rule 20, had presented to us a petition for certiorari before judgment in the Court of Appeals with respect to the granting of the plaintiffs’ prayer for declaratory relief. Our decisions in
                - emphasis [ref=e257]: Mitchell
                - text: v.
                - emphasis [ref=e258]: Donovan,
                - link "398 U. S. 427" [ref=e260] [cursor=pointer]:
                  - /url: /opinion/108169/mitchell-v-donovan/
                - text: (1970), and
                - emphasis [ref=e261]: Gunn v. University Committee,
                - link "399 U. S. 383" [ref=e263] [cursor=pointer]:
                  - /url: /opinion/108197/gunn-v-university-committee-to-end-the-war-in-viet-nam/
                - text: (1970), are to the effect that § 1253 does not authorize an appeal to this Court from the grant or denial of declaratory relief alone. We conclude, nevertheless, that those decisions do not foreclose our review of both the injunctive and the declaratory aspects of a case of this kind when it is properly here, as this one is, on appeal under § 1253 from specific denial of injunctive relief, and the arguments as to both aspects are necessarily identical. See
                - emphasis [ref=e264]: Carter
                - text: v.
                - emphasis [ref=e265]: Jury Comm’n,
                - link "396 U. S. 320" [ref=e267] [cursor=pointer]:
                  - /url: /opinion/108026/carter-v-jury-commn-of-greene-cty/
                - text: (1970);
                - emphasis [ref=e268]: Florida Lime Growers
                - text: v.
                - emphasis [ref=e269]: Jacobsen,
                - link "362 U. S. 73, 80-81" [ref=e271] [cursor=pointer]:
                  - /url: /opinion/106012/florida-lime-avocado-growers-inc-v-jacobsen/#80
                - text: (1960). It would be destructive of time and energy for all concerned were we to rule otherwise. Cf.
                - emphasis [ref=e272]: Doe
                - text: v.
                - emphasis [ref=e273]: Bolton, post,
                - text: p. 179.
              - paragraph [ref=e274]: IV
              - paragraph [ref=e275]:
                - text: We are next confronted with issues of justiciability, standing, and abstention. Have Roe and the Does established that “personal stake in the outcome of the controversy,”
                - emphasis [ref=e276]: Baker
                - text: v.
                - emphasis [ref=e277]: Carr,
                - link "369 U. S. 186, 204" [ref=e279] [cursor=pointer]:
                  - /url: /opinion/106366/baker-v-carr/#204
                - text: (1962), that insures that “the dispute sought to be adjudicated will be presented in an adversary context and in a form historically viewed as capable of judicial resolution,”
                - emphasis [ref=e280]: Flast
                - text: v.
                - emphasis [ref=e281]: Cohen,
                - link "392 U. S. 83, 101" [ref=e283] [cursor=pointer]:
                  - /url: /opinion/107731/flast-v-cohen/#101
                - text: (1968), and
                - emphasis [ref=e284]: Sierra Club
                - text: v.
                - emphasis [ref=e285]: Morton,
                - link "405 U. S. 727, 732" [ref=e287] [cursor=pointer]:
                  - /url: /opinion/108502/sierra-club-v-morton/#732
                - text: (1972) ? And what effect did the pendency of criminal abortion charges against Dr. Hallford in state court have upon the propriety of the federal court’s granting relief to him as a plaintiff-intervenor?
              - paragraph [ref=e288]:
                - link "*124 124" [ref=e289] [cursor=pointer]:
                  - /url: "#124"
                - text: A.
                - emphasis [ref=e290]: Jane Roe.
                - text: Despite the use of the pseudonym, no suggestion is made that Roe is a fictitious person. For purposes of her case, we accept as true, and as established, her existence; her pregnant state, as of the inception of her suit in March 1970 and as late as May 21 of that year when she filed an alias affidavit with the District Court; and her inability to obtain a legal abortion in Texas.
              - paragraph [ref=e291]:
                - text: Viewing Roe’s case as of the time of its filing and thereafter until as late as May, there can be little dispute that it then presented a case or controversy and that, wholly apart from the class aspects, she, as a pregnant single woman thwarted by the Texas criminal abortion laws, had standing to challenge those statutes.
                - emphasis [ref=e292]: Abele
                - text: v.
                - emphasis [ref=e293]: Markle,
                - link "452 F. 2d 1121, 1125" [ref=e295] [cursor=pointer]:
                  - /url: /opinion/300581/janice-abele-v-arnold-markle/#1125
                - text: (CA2 1971);
                - emphasis [ref=e296]: Crossen
                - text: v.
                - emphasis [ref=e297]: Breckenridge,
                - link "446 F. 2d 833, 838-839" [ref=e299] [cursor=pointer]:
                  - /url: /opinion/8899226/crossen-v-breckenridge/#838
                - text: (CA6 1971);
                - emphasis [ref=e300]: Poe
                - text: v.
                - emphasis [ref=e301]: Menghini,
                - link "339 F. Supp. 986, 990-991" [ref=e303] [cursor=pointer]:
                  - /url: /opinion/1460630/poe-v-menghini/#990
                - text: (Kan. 1972). See
                - emphasis [ref=e304]: Truax
                - text: v.
                - emphasis [ref=e305]: Raich,
                - link "239 U. S. 33" [ref=e307] [cursor=pointer]:
                  - /url: /opinion/98542/truax-v-raich/
                - text: (1915). Indeed, we do not read the appellee’s brief as really asserting anything to the contrary. The “logical nexus between the status asserted and the claim sought to be adjudicated,”
                - emphasis [ref=e308]: Flast
                - text: v.
                - emphasis [ref=e309]: Cohen,
                - link "392 U. S., at 102" [ref=e311] [cursor=pointer]:
                  - /url: /opinion/107731/flast-v-cohen/#102
                - text: ", and the necessary degree of contentiousness,"
                - emphasis [ref=e312]: Golden
                - text: v.
                - emphasis [ref=e313]: Zwickler,
                - link "394 U. S. 103" [ref=e315] [cursor=pointer]:
                  - /url: /opinion/107868/golden-v-zwickler/
                - text: (1969), are both present.
              - paragraph [ref=e316]: The appellee notes, however, that the record does not disclose that Roe was pregnant at the time of the District Court hearing on May 22, 1970,6 or on the following June 17 when the court’s opinion and judgment were filed. And he suggests that Roe’s case must now be moot because she and all other members of her class are no longer subject to any 1970 pregnancy.
              - paragraph [ref=e317]:
                - link "*125 125" [ref=e318] [cursor=pointer]:
                  - /url: "#125"
                - text: The usual rule in federal cases is that an actual controversy must exist at stages of appellate or certiorari review, and not simply at the date the action is initiated.
                - emphasis [ref=e319]: United States
                - text: v.
                - emphasis [ref=e320]: Munsingwear, Inc.,
