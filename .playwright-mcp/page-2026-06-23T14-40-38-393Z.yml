                - link "401 U. S. 66" [ref=e358] [cursor=pointer]:
                  - /url: /opinion/108264/samuels-et-al-v-mackell-district-attorney-of-queens-county-et-al/
                - text: (1971), compels the conclusion that the District Court erred when it granted declaratory relief to Dr. Hallford instead of refraining from so doing. The court, of course, was correct in refusing to grant injunctive relief to the doctor. The reasons supportive of that action, however, are those expressed in
                - emphasis [ref=e359]: Samuels
                - text: v.
                - emphasis [ref=e360]: Mackell, supra,
                - text: and in
                - emphasis [ref=e361]: Younger
