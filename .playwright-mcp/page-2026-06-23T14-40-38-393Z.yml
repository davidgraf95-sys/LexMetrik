                - link "*127 127" [ref=e362] [cursor=pointer]:
                  - /url: "#127"
                - emphasis [ref=e363]: Harris,
                - link "401 U. S. 37" [ref=e365] [cursor=pointer]:
                  - /url: /opinion/108263/younger-v-harris/
                - text: (1971);
                - emphasis [ref=e366]: Boyle
                - text: v.
                - emphasis [ref=e367]: Landry,
                - link "401 U. S. 77" [ref=e369] [cursor=pointer]:
                  - /url: /opinion/108265/boyle-v-landry/
