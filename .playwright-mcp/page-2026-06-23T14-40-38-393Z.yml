              - generic [ref=e858]:
                - text: "1"
                - paragraph [ref=e859]: “Article 1191. Abortion
                - blockquote [ref=e860]: “If any person shall designedly administer to a pregnant woman or knowingly procure to be administered with her consent any drug or medicine, or shall use towards her any violence or means whatever externally or internally applied, and thereby procure an abortion, he shall be confined in the penitentiary not less than two nor more than five years; if it be done without her consent, the punishment shall be doubled. By 'abortion’ is meant that the life of the fetus or embryo shall be destroyed in the woman’s womb or that a premature birth thereof be caused.
                - blockquote [ref=e861]: “Art. 1192. Furnishing the means
                - blockquote [ref=e862]: “Whoever furnishes the means for procuring an abortion knowing the purpose intended is guilty as an accomplice.
                - blockquote [ref=e863]: “Art. 1193. Attempt at abortion
                - blockquote [ref=e864]:
                  - text: “If the means used shall fail to produce an abortion, the offender is nevertheless guilty of an attempt to produce abortion, provided it be shown that such means were calculated to produce that result,
                  - link "*118" [ref=e865] [cursor=pointer]:
                    - /url: "#118"
                  - text: and shall be fined not less than one hundred nor more than one thousand dollars.
                - blockquote [ref=e866]: “Art. 1194. Murder in producing abortion
                - blockquote [ref=e867]: “If the death of the mother is occasioned by an abortion so produced or by an attempt to effect the same it is murder.”
                - blockquote [ref=e868]: “Art. 1196. By medical advice
                - blockquote [ref=e869]: “Nothing in this chapter applies to an abortion procured or attempted by medical advice for the purpose of saving the life of the mother.”
                - paragraph [ref=e870]: "The foregoing Articles, together with Art. 1195, compose Chapter 9 of Title 15 of the Penal Code. Article 1195, not attacked here, reads:"
                - blockquote [ref=e871]: “Art. 1195. Destroying unborn child
                - blockquote [ref=e872]: “Whoever shall during parturition of the mother destroy the vitality or life in a child in a state of being born and before actual birth, which child would otherwise have been born alive, shall be confined in the penitentiary for life or for not less than five years.”
