                - link "389 U. S. 347, 350" [ref=e555] [cursor=pointer]:
                  - /url: /opinion/107564/katz-v-united-states/#350
                - text: (1967),
                - emphasis [ref=e556]: Boyd
                - text: v.
                - emphasis [ref=e557]: United States,
                - link "116 U. S. 616" [ref=e559] [cursor=pointer]:
                  - /url: /opinion/91573/boyd-v-united-states/
                - text: (1886), see
                - emphasis [ref=e560]: Olmstead
                - text: v.
                - emphasis [ref=e561]: United States,
                - link "277 U. S. 438, 478" [ref=e563] [cursor=pointer]:
                  - /url: /opinion/101320/olmstead-v-united-states/#478
                - text: (1928) (Brandeis, J., dissenting); in the penumbras of the Bill of Rights,
                - emphasis [ref=e564]: Griswold
                - text: v.
                - emphasis [ref=e565]: Connecticut,
                - link "381 U. S., at 484-485" [ref=e567] [cursor=pointer]:
