                - paragraph [ref=e1230]:
                  - text: Neither in this opinion nor in
                  - emphasis [ref=e1231]: Doe
                  - text: v.
                  - emphasis [ref=e1232]: Bolton, post,
                  - text: p. 179, do wo discuss the father’s rights, if any exist in the constitutional context, in the abortion decision. No paternal right has been asserted in either of the cases, and the Texas and the Georgia statutes on their face take no cognizance of the father. We are aware that some statutes recognize the father under certain circumstances. North Carolina, for example, N. C. Gen. Stat. § 14-45.1 (Supp. 1971), requires written permission for the abortion from the husband when the woman is a married minor, that is, when she is less than 18 years of age, 41 N. C. A. G. 489 (1971); if the woman is an unmarried minor, written permission from the parents is required. We need not now decide whether provisions of this kind are constitutional.
