              - paragraph [ref=e695]: Although the results are divided, most of these courts have agreed that the right of privacy, however based, is broad enough to cover the abortion decision; that the right, nonetheless, is not absolute and is subject to some limitations; and that at some point the state interests as to protection of health, medical standards, and prenatal life, become dominant. We agree with this approach.
