                - paragraph [ref=e973]:
                  - text: "Means, The Phoenix of Abortional Freedom: Is a Penumbral or Ninth-Amendment Right About to Arise from the Nineteenth-Century Legislative Ashes of a Fourteenth-Century Common-Law Liberty?, 17 N. Y. L. F. 335 (1971) (hereinafter Means II). The author examines-the two principal precedents cited marginally by Coke, both contrary to his dictum, and traces the treatment of these and other cases by earlier commentators. He concludes that Coke, who himself participated as an advocate in an abortion case in 1601, may have intentionally misstated the law. The author even suggests a reason: Coke’s strong feelings against abortion, coupled with his determination to assert common-law (secular) jurisdiction to assess penalties for an offense that traditionally had been an exclusively ecclesiastical or canon-law crime. See also Lader 78-79, who notes that some scholars doubt that the common law ever was applied to abortion; that the English ecclesiastical courts seem to have lost interest in the problem after 1527; and that the preamble to the English legislation of 1803, 43 Geo. 3, c. 58, § 1, referred to in the text,"
                  - emphasis [ref=e974]: infra,
                  - text: at 136, states that “no adequate means have been hitherto provided for the prevention and punishment of such offenses.”
