                - emphasis [ref=e375]: Karalexis,
                - link "401 U. S. 216" [ref=e377] [cursor=pointer]:
                  - /url: /opinion/108271/byrne-v-karalexis/
                - text: (1971). See also
                - emphasis [ref=e378]: Dombrowski
                - text: v.
                - emphasis [ref=e379]: Pfister,
                - link "380 U. S. 479" [ref=e381] [cursor=pointer]:
                  - /url: /opinion/107025/dombrowski-v-pfister/
                - text: (1965). We note, in passing, that
                - emphasis [ref=e382]:
                  - link "Younger" [ref=e384] [cursor=pointer]:
                    - /url: /opinion/108263/younger-v-harris/
                - text: and its companion cases were decided after the three-judge District Court decision in this case.
              - paragraph [ref=e385]: Dr. Hallford’s complaint in intervention, therefore, is to be dismissed.7 He is remitted to his defenses in the state criminal proceedings against him. We reverse the judgment of the District Court insofar as it granted Dr. Hallford relief and failed to dismiss his complaint in intervention.
              - paragraph [ref=e386]:
                - text: C.
                - emphasis [ref=e387]: The Does.
                - text: In view of our ruling as to Roe’s standing in her case, the issue of the Does’ standing in their case has little significance. The claims they assert are essentially the same as those of Roe, and they attack the same statutes. Nevertheless, we briefly note the Does’ posture.
              - paragraph [ref=e388]:
                - text: Their pleadings present them as a childless married couple, the woman not being pregnant, who have no desire to have children at this time because of their having received medical advice that Mrs. Doe should avoid pregnancy, and for “other highly personal reasons.” But they “fear . . . they may face the prospect of becoming
                - link "*128 128" [ref=e389] [cursor=pointer]:
                  - /url: "#128"
                - text: parents.” And if pregnancy ensues, they “would want to terminate” it by an abortion. They assert an inability to obtain an abortion legally in Texas and, consequently, the prospect of obtaining an illegal abortion there or of going outside Texas to some place where the procedure could be obtained legally and competently.
              - paragraph [ref=e390]: We thus have as plaintiffs a married couple who have, as their asserted immediate and present injury, only an alleged “detrimental effect upon [their] marital happiness” because they are forced to “the choice of refraining from normal sexual relations or of endangering Mary Doe’s health through a possible pregnancy.” Their claim is that sometime in the future Mrs. Doe might become pregnant because of possible failure of contraceptive measures, and at that time in the future she might want an abortion that might then be illegal under the Texas statutes.
              - paragraph [ref=e391]:
                - text: This very phrasing of the Does’ position reveals its speculative character. Their alleged injury rests on possible future contraceptive failure, possible future pregnancy, possible future unpreparedness for parenthood, and possible future impairment of health. Any one or more of these several possibilities may not take place and all may not combine. In the Does’ estimation, these possibilities might have some real or imagined impact upon their marital happiness. But we are not prepared to say that the bare allegation of so indirect an injury is sufficient to present an actual case or controversy.
                - emphasis [ref=e392]: Younger
                - text: v.
                - emphasis [ref=e393]: Harris,
                - link "401 U. S., at 41-42" [ref=e395] [cursor=pointer]:
                  - /url: /opinion/108263/younger-v-harris/#41
                - text: ;
                - emphasis [ref=e396]: Golden
                - text: v.
                - emphasis [ref=e397]: Zwickler,
                - link "394 U. S., at 109-110" [ref=e399] [cursor=pointer]:
                  - /url: /opinion/107868/golden-v-zwickler/#109
                - text: ;
                - emphasis [ref=e400]: Abele
                - text: v.
                - emphasis [ref=e401]: Markle,
                - link "452 F. 2d, at 1124-1125" [ref=e403] [cursor=pointer]:
                  - /url: /opinion/300581/janice-abele-v-arnold-markle/#1124
                - text: ;
                - emphasis [ref=e404]: Crossen
                - text: v.
                - emphasis [ref=e405]: Breckenridge,
                - link "446 F. 2d, at 839" [ref=e407] [cursor=pointer]:
                  - /url: /opinion/8899226/crossen-v-breckenridge/#839
                - text: . The Does’ claim falls far short of those resolved otherwise in the cases that the Does urge upon us, namely,
                - emphasis [ref=e408]: Investment Co. Institute
                - text: v.
                - emphasis [ref=e409]: Camp,
                - link "401 U. S. 617" [ref=e411] [cursor=pointer]:
                  - /url: /opinion/108300/investment-company-institute-v-camp/
                - text: (1971);
                - emphasis [ref=e412]: Data Processing Service
                - text: v.
                - emphasis [ref=e413]: Camp,
                - link "397 U. S. 150" [ref=e415] [cursor=pointer]:
                  - /url: /opinion/108088/association-of-data-processing-service-organizations-inc-v-camp/
                - text: (1970);
                - link "*129 129" [ref=e416] [cursor=pointer]:
                  - /url: "#129"
                - text: and
                - emphasis [ref=e417]: Epperson
                - text: v.
                - emphasis [ref=e418]: Arkansas,
                - link "393 U. S. 97" [ref=e420] [cursor=pointer]:
                  - /url: /opinion/107793/epperson-v-arkansas/
                - text: (1968). See also
                - emphasis [ref=e421]: Truax
                - text: v.
                - emphasis [ref=e422]: Raich,
                - link "239 U. S. 33" [ref=e424] [cursor=pointer]:
                  - /url: /opinion/98542/truax-v-raich/
                - text: (1915).
              - paragraph [ref=e425]: The Does therefore are not appropriate plaintiffs in this litigation. Their complaint was properly dismissed by the District Court, and we affirm that dismissal.
              - paragraph [ref=e426]: "y"
              - paragraph [ref=e427]:
                - text: The principal thrust of appellant’s attack on the Texas statutes is that they improperly invade a right, said to be possessed by the pregnant woman, to choose to terminate her pregnancy. Appellant would discover this right in the concept of personal “liberty” embodied in the Fourteenth Amendment’s Due Process Clause; or in personal, marital, familial, and sexual privacy said to be protected by the Bill of Rights or its penumbras, see
                - emphasis [ref=e428]: Griswold
                - text: v.
                - emphasis [ref=e429]: Connecticut,
                - link "381 U. S. 479" [ref=e431] [cursor=pointer]:
                  - /url: /opinion/107082/griswold-v-connecticut/
                - text: (1965);
                - emphasis [ref=e432]: Eisenstadt
                - text: v.
                - emphasis [ref=e433]: Baird,
                - link "405 U. S. 438" [ref=e435] [cursor=pointer]:
                  - /url: /opinion/108489/eisenstadt-v-baird/
                - text: (1972);
                - link "id., at 460" [ref=e437] [cursor=pointer]:
                  - /url: /opinion/108489/eisenstadt-v-baird/#460
                  - emphasis [ref=e438]: id.,
                  - text: at 460
                - text: (White, J., concurring in result); or among those rights reserved to the people by the Ninth Amendment,
                - emphasis [ref=e439]: Griswold
                - text: v.
                - emphasis [ref=e440]: Connecticut,
                - link "381 U. S., at 486" [ref=e442] [cursor=pointer]:
                  - /url: /opinion/107082/griswold-v-connecticut/#486
                - text: (Goldberg, J., concurring). Before addressing this claim, we feel it desirable briefly to survey, in several aspects, the history of abortion, for such insight as that history may afford us, and then to examine the state purposes and interests behind the criminal abortion laws.
              - paragraph [ref=e443]: VI
              - paragraph [ref=e444]: It perhaps is not generally appreciated that the restrictive criminal abortion laws in effect in a majority of States today are of relatively recent vintage. Those laws, generally proscribing abortion or its attempt at any time during pregnancy except when necessary to preserve the pregnant woman’s life, are not of ancient or even of common-law origin. Instead, they derive from statutory changes effected, for the most part, in the latter half of the 19th century.
              - paragraph [ref=e445]:
                - link "*130 130" [ref=e446] [cursor=pointer]:
                  - /url: "#130"
                - text: "1."
                - emphasis [ref=e447]: Ancient attitudes.
                - text: These are not capable of precise determination. We are told that at the time of the Persian Empire abortifacients were known and that criminal abortions were severely punished.8 We are also told, however, that abortion was practiced in Greek times as well as in the Roman Era,9 and that “it was resorted to without scruple.”10 The Ephesian, Soranos, often described as the greatest of the ancient gynecologists, appears to have been generally opposed to Rome’s prevailing free-abortion practices. He found it necessary to think first of the life of the mother, and he resorted to abortion when, upon this standard, he felt the procedure advisable.11 Greek and Roman law afforded little protection to the unborn. If abortion was prosecuted in some places, it seems to have been based on a concept of a violation of the father’s right to his offspring. Ancient religion did not bar abortion.12
              - paragraph [ref=e448]:
                - text: "2."
                - emphasis [ref=e449]: The Hippocratic Oath.
                - text: What then of the famous Oath that has stood so long as the ethical guide of the medical profession and that bears the name of the great Greek (460(?)-377(?) B. C.), who has been described
                - link "*131 131" [ref=e450] [cursor=pointer]:
                  - /url: "#131"
                - text: "as the Father of Medicine, the “wisest and the greatest practitioner of his art,” and the “most important and most complete medical personality of antiquity,” who dominated the medical schools of his time, and who typified the sum of the medical knowledge of the past? 13 The Oath varies somewhat according to the particular translation, but in any translation the content is clear: “I will give no deadly medicine to anyone if asked, nor suggest any such counsel; and in like manner I will not give to a woman a pessary to produce abortion,” 14 or “I will neither give a deadly drug to anybody if asked for it, nor will I make a suggestion to this effect. Similarly, I will not give to a woman an abortive remedy.”15"
              - paragraph [ref=e451]:
                - text: Although the Oath is not mentioned in any of the principal briefs in this case or in
                - emphasis [ref=e452]: Doe
                - text: v.
                - emphasis [ref=e453]: Bolton, post,
                - text: "p. 179, it represents the apex of the development of strict ethical concepts in medicine, and its influence endures to this day. Why did not the authority of Hippocrates dissuade abortion practice in his time and that of Rome? The late Dr. Edelstein provides us with a theory: 16 The Oath was not uncontested even in Hippocrates' day; only the Pythagorean school of philosophers frowned upon the related act of suicide. Most Greek thinkers, on the other hand, commended abortion, at least prior to viability. See Plato, Republic, V, 461; Aristotle, Politics, VII, 1335b 25. For the Pythagoreans, however, it was a matter of dogma. For them the embryo was animate from the moment of conception, and abortion meant destruction of a living being. The abortion clause of the Oath, therefore, “echoes Pythagorean doctrines,”"
                - link "*132 132" [ref=e454] [cursor=pointer]:
                  - /url: "#132"
                - text: and “[i’jn no other stratum of Greek opinion were such views held or proposed in the same spirit of uncompromising austerity.” 17
              - paragraph [ref=e455]: Dr. Edelstein then concludes that the Oath originated in a group representing only a small segment of Greek opinion and that it certainly was not accepted by all ancient physicians. He points out that medical writings down to Galen (A. D. 130-200) “give evidence of the violation of almost every one of its injunctions.” 18 But with the end of' antiquity a decided change took place. Resistance against suicide and against abortion became common. The Oath came to be popular. The emerging teachings of Christianity were in agreement with the Pythagorean ethic. The Oath “became the nucleus of all medical ethics” and “was applauded as the embodiment of truth.” Thus, suggests Dr. Edelstein, it is “a Pythagorean manifesto and not the expression of an absolute standard of medical conduct.” 19
              - paragraph [ref=e456]: This, it seems to us, is a satisfactory and acceptable explanation of the Hippocratic Oath's apparent rigidity. It enables us to understand, in historical context, a long-accepted and revered statement of medical ethics.
              - paragraph [ref=e457]:
                - text: "3."
                - emphasis [ref=e458]: The common law.
                - text: It is undisputed that at common law, abortion performed
                - emphasis [ref=e459]: before
                - text: “quickening”— the first recognizable movement of the fetus
                - emphasis [ref=e460]: in útero,
                - text: appearing usually from the 16th to the 18th week of pregnancy 20 — was not an indictable offense.21 The ab
                - link "*133 133" [ref=e461] [cursor=pointer]:
                  - /url: "#133"
                - text: sence of- a common-law crime for pre-quickening abortion appears to have developed from a confluence of earlier philosophical, theological, and civil and canon law concepts of when life begins. These disciplines variously approached the question in terms of the point at which the embryo or fetus became “formed” or recognizably human, or in terms of when a “person” came into being, that is, infused with a “soul” or “animated.” A loose consensus evolved in early English law that these events occurred at some point between conception and live birth.22 This was “mediate animation.” Although
                - link "*134 134" [ref=e462] [cursor=pointer]:
                  - /url: "#134"
                - text: Christian theology and the canon law came to fix the point of animation at 40 days for a male and 80 days for a female, a view that persisted until the 19th century, there was otherwise little ' agreement about the precise time of formation or animation. There was agreement, however, that prior to this point the fetus was to be regarded as part of the mother, and its destruction, therefore, was not homicide. Due to continued uncertainty about the precise time when animation occurred, to the lack of any empirical basis for the 40-80-day view, and perhaps to Aquinas' definition of movement as one of the two first principles of life, Bracton focused upon quickening as the critical point. The significance of quickening was echoed by later common-law scholars and found its way into the received common law in this country.
              - paragraph [ref=e463]:
                - text: Whether abortion of a
                - emphasis [ref=e464]: quick
                - text: fetus was a felony at common law, or even a lesser crime, is still disputed. Bracton, writing early in the 13th century, thought it homicide.23 But the later and predominant view, following the great common-law scholars, has been that it was, at most, a lesser offense. In a frequently cited
                - link "*135 135" [ref=e465] [cursor=pointer]:
                  - /url: "#135"
                - text: passage, Coke took the position that abortion of a woman “quick with childe” is “a great misprision, and no murder.” 24 Blackstone followed, saying that while abortion after quickening had once been considered manslaughter (though not murder), “modern law” took a less severe view.25 A recent review of the common-law precedents argues, however, that those precedents contradict Coke and that even post-quickening abortion was never established as a common-law crime.26 This is of some importance because while most American courts ruled, in holding or dictum, that abortion of an unquickened fetus was not criminal under their received common law,27 others followed Coke in stating that abor
                - link "*136 136" [ref=e466] [cursor=pointer]:
                  - /url: "#136"
                - text: tion of a quick fetus was a “misprision,” a term they translated to mean “misdemeanor.” 28 That their reliance on Coke on this aspect of the law was uncritical and, apparently in all the reported cases, dictum (due probably to the paucity of common-law prosecutions for post-quickening abortion), makes it now appear doubtful that abortion was ever firmly established as a common-law crime even with respect to the destruction of a quick fetus.
              - paragraph [ref=e467]:
                - text: "4."
                - emphasis [ref=e468]: The English statutory law.
                - text: England's first criminal abortion statute, Lord Ellenborough's Act, 43 Geo. 3, c. 58, came in 1803. It made abortion of a quick fetus, § 1, a capital crime, but in § 2 it provided lesser penalties for the felony of abortion before quickening, and thus preserved the “quickening” distinction. This contrast was continued in the general revision of 1828, 9 Geo. 4, c. 31, § 13. It disappeared, however, together with the death penalty, in 1837, 7 Will. 4 & 1 Viet., c. 85, § 6, and did not reappear in the Offenses Against the Person Act of 1861, 24 & 25 Viet., c. 100, § 59, that formed the core of English anti-abortion law until the liberalizing reforms of 1967. In 1929, the Infant Life (Preservation) Act, 19 & 20 Geo. 5, c. 34, came into being. Its emphasis was upon the destruction of “the life of a child capable of being born alive.” It made a willful act performed with the necessary intent a felony. It contained a proviso that one was not to be
                - link "*137 137" [ref=e469] [cursor=pointer]:
                  - /url: "#137"
                - text: found guilty of the offense “unless it is proved that the act which caused the death of the child was not done in good faith for the purpose only of preserving the life of the mother.”
              - paragraph [ref=e470]:
                - text: A seemingly notable development in the English law was the case of
                - emphasis [ref=e471]: Rex
                - text: v.
                - emphasis [ref=e472]: Bourne,
                - text: "[1939] 1 K. B. 687. This case apparently answered in the affirmative the question whether an abortion necessary to preserve the life of the pregnant woman was excepted from the criminal penalties of the 1861 Act. In his instructions to the jury, Judge Macnaghten referred to the 1929 Act, and observed that that Act related to “the case where a child is killed by a wilful act at the time when it is being delivered in the ordinary course of nature.”"
                - emphasis [ref=e473]: Id:,
                - text: at 691. He concluded that the 1861 Act’s use of the word “unlawfully,” imported the same meaning expressed by the specific proviso in the 1929 Act, even though there was no mention of preserving the mother’s life in the 1861 Act. He then construed the phrase “preserving the life of the mother” broadly, that is, “in a reasonable sense,” to include a serious and permanent threat to the mother’s
                - emphasis [ref=e474]: health,
                - text: and instructed the jury to acquit Dr. Bourne if it found he had acted in a good-faith belief that the abortion was necessary for this purpose.
                - emphasis [ref=e475]: Id.,
                - text: at 693-694. The jury did acquit.
              - paragraph [ref=e476]:
                - text: Recently, Parliament enacted a new abortion law. This is the Abortion Act of 1967, 15 & 16 Eliz. 2, c. 87. The Act permits a licensed physician to perform an abortion where two other licensed physicians agree (a) “that the continuance of the pregnancy would involve risk to the life of the pregnant woman, or of injury to the physical or mental health of the pregnant woman or any existing children of her family, greater than if the pregnancy were terminated,” or (b) “that there is a substantial risk that if the child were born it would suffer from such physical or mental abnormalities as
                - link "*138 138" [ref=e477] [cursor=pointer]:
                  - /url: "#138"
                - text: to be seriously handicapped.” The Act also provides that, in making this determination, “account may be taken of the pregnant woman’s actual or reasonably foreseeable environment.” It also permits a physician, without the concurrence of others, to terminate a pregnancy where he is of the good-faith opinion that the abortion “is immediately necessary to save the life or to prevent grave permanent injury to the physical or mental health of the pregnant woman.”
              - paragraph [ref=e478]:
                - text: "5."
                - emphasis [ref=e479]: The American law.
                - text: In this country, the law in effect in all but a few States until mid-19th century was the pre-existing English common law. Connecticut, the first State to enact abortion legislation, adopted in 1821 that part of Lord Ellenborough’s Act that related to a woman “quick with child.”29 The death penalty was not imposed. Abortion before quickening was made a crime in that State only in I860.30 In 1828, New York enacted legislation 31 that, in two respects, was to serve as a model for early anti-abortion statutes. First, while barring destruction of an unquickened fetus as well as a quick fetus, it made the former only a misdemeanor, but the latter second-degree manslaughter. Second, it incorporated a concept of therapeutic abortion by providing that an abortion was excused if it “shall have been necessary to preserve the life of such mother, or shall have been advised by two physicians to be necessary for such purpose.” By 1840, when Texas had received the common law,32 only eight American States
                - link "*139 139" [ref=e480] [cursor=pointer]:
                  - /url: "#139"
                - text: had statutes dealing with abortion.33 It was not until after the War Between the States that legislation began generally to replace the common law. Most of these initial statutes dealt severely with abortion after quickening but were lenient with it before quickening. Most punished attempts equally with completed abortions. While many statutes included the exception for an abortion thought by one or more physicians to be necessary to save the mother’s life, that provision soon disappeared and the typical law required that the procedure actually be necessary for that purpose.
              - paragraph [ref=e481]:
                - text: Gradually, in the middle and late 19th century the quickening distinction disappeared from the statutory law of most States and the degree of the offense and the penalties were increased. By the end of the 1950’s, a large majority of the jurisdictions banned abortion, however and whenever performed, unless done to save or preserve the life of the mother.34 The exceptions, Alabama and the District of Columbia, permitted abortion to preserve the mother’s health.35 Three States permitted abortions that were not “unlawfully” performed or that were not “without lawful justification,” leaving interpretation of those standards to the courts.36 In
                - link "*140 140" [ref=e482] [cursor=pointer]:
                  - /url: "#140"
                - text: the past several years, however, a trend toward liberalization of abortion statutes has resulted in adoption, by about one-third of the States, of less stringent laws, most of them patterned after the ALI Model Penal Code, § 230.3,37 set forth as Appendix B to the opinion in
                - emphasis [ref=e483]: Doe
                - text: v.
                - emphasis [ref=e484]: Bolton, post,
                - text: p. 205.
              - paragraph [ref=e485]:
                - text: It is thus apparent that at common law, at the time of the adoption of our Constitution, and throughout the major portion of the 19th century, abortion was viewed with less disfavor than under most American statutes currently in effect. Phrasing it another way, a woman enjoyed a substantially broader right to terminate a pregnancy than she does in most States today. At least with respect to the early stage of pregnancy, and very possibly without such a limitation, the oppor
                - link "*141 141" [ref=e486] [cursor=pointer]:
                  - /url: "#141"
                - text: tunity to make this choice was present in this country well into the 19th century. Even later, the law continued for some time to treat less punitively an abortion procured in early pregnancy.
              - paragraph [ref=e487]:
                - text: "6."
                - emphasis [ref=e488]: The position of the American Medical Association.
                - text: The anti-abortion mood prevalent in this country in the late 19th century was shared by the medical profession. Indeed, the attitude of the profession may have played a significant role in the enactment of stringent criminal abortion legislation during that period.
              - paragraph [ref=e489]: "An AMA Committee on Criminal Abortion was appointed in May 1857. It presented its report, 12 Trans, of the Am. Med. Assn. 73-78 (1859), to the Twelfth Annual Meeting. That report observed that the Committee had been appointed to investigate criminal abortion “with a view to its general suppression.” It deplored abortion and its frequency and it listed three causes of “this general demoralization”:"
              - blockquote [ref=e490]: “The first of these causes is a wide-spread popular ignorance of the true character of the crime— a belief, even among mothers themselves, that the foetus is not alive till after the period of quickening.
              - blockquote [ref=e491]: “The second of the agents alluded to is the fact that the profession themselves are frequently supposed careless of foetal life ....
              - blockquote [ref=e492]:
                - text: “The third reason of the frightful extent of this crime is found in the grave defects of our laws, both common and statute, as regards the independent and actual existence of the child before birth, as a living being. These errors, which are sufficient in most instances to prevent conviction, are based, and only based, upon mistaken and exploded medical dogmas. With strange inconsistency, the law fully acknowledges the foetus in útero and its inherent rights, for civil purposes; while personally and as criminally affected, it fails to recognize it,
                - link "*142 142" [ref=e493] [cursor=pointer]:
                  - /url: "#142"
                - text: and to its life as yet denies all protection.”
                - emphasis [ref=e494]: Id,.,
                - text: at 75-76.
              - paragraph [ref=e495]:
                - text: The Committee then offered, and the Association adopted, resolutions protesting “against such unwarrantable destruction of human life,” calling upon-state legislatures to revise their abortion laws, and requesting the cooperation of state medical societies “in pressing the subject.”
                - emphasis [ref=e496]: Id.,
                - text: at 28, 78.
              - paragraph [ref=e497]:
                - text: In 1871 a long and vivid report was submitted by the Committee on Criminal Abortion. It ended with the observation, “We had to deal with human life. In a matter of less importance we could entertain no compromise. An honest judge on the bench would call things by their proper names. We could do no less.” 22 Trans, of the Am. Med. Assn. 258 (1871). It proffered resolutions, adopted by the Association,
                - emphasis [ref=e498]: id.,
                - text: at 38-39, recommending, among other things, that it “be unlawful and unprofessional for any physician to induce abortion- or premature labor, without the concurrent opinion of at least one respectable consulting physician, and then always with a view to the safety of the child— if that be possible,” and calling “the attention of the clergy of all denominations to the perverted views of morality entertained by a large class of females — aye, and men also, on this important question.”
              - paragraph [ref=e499]:
                - text: Except for periodic condemnation of the criminal abortionist, no further formal AMA action took place until 1967. In that year, the Committee on Human Reproduction urged the adoption of a stated policy of opposition to induced abortion, except when there is “documented medical evidence” of a threat to the health or life of the mother, or that the child “may be born with incapacitating physical deformity or mental deficiency,” or that a pregnancy “resulting from legally established statutory or forcible rape or incest may constitute a threat to the mental or physical health of the
                - link "*143 143" [ref=e500] [cursor=pointer]:
                  - /url: "#143"
                - text: patient,” two other physicians “chosen because of their recognized professional competence have examined the patient and have concurred in writing,” and the procedure “is performed in a hospital accredited by the Joint Commission on Accreditation of Hospitals.” The providing of medical information by physicians to state legislatures in their consideration of legislation regarding therapeutic abortion was “to be considered consistent with the principles of ethics of the American Medical Association.” This recommendation was adopted by the House of Delegates. Proceedings of the AMA House of Delegates 40-51 (June 1967).
              - paragraph [ref=e501]:
                - text: In 1970, after the introduction of a variety of proposed resolutions, and of a report from its Board of Trustees, a reference committee noted “polarization of the medical profession on this controversial issue”; division among those who had testified; a difference of opinion among AMA councils and .committees; “the remarkable shift in testimony” in six months, felt to be influenced “by the rapid changes in state laws and by the judicial decisions which tend to make abortion more freely available;” and a feeling “that this trend will continue.” On June 25, 1970, the House of Delegates adopted preambles and most of the resolutions proposed by the reference committee. The preambles emphasized “the best interests of the patient,” “sound clinical judgment,” and “informed patient consent,” in contrast to “mere acquiescence to the patient's demand.” The resolutions asserted that abortion is a medical procedure that should be performed by a licensed physician in an accredited hospital only after consultation with two other physicians and in conformity with state law, and that no party to the procedure should be required to violate personally held moral principles.38 Proceedings
                - link "*144 144" [ref=e502] [cursor=pointer]:
                  - /url: "#144"
                - text: of the AMA House of Delegates 220 (June 1970). The AMA Judicial Council rendered a complementary opinion.39
              - paragraph [ref=e503]:
                - text: "7."
                - emphasis [ref=e504]: The position of the American Public Health Association.
                - text: "In October 1970, the Executive Board of the APHA adopted Standards for Abortion Services. These were five in number:"
              - blockquote [ref=e505]:
                - text: “a. Rapid and simple abortion referral must be readily available through state and local public
                - link "*145 145" [ref=e506] [cursor=pointer]:
                  - /url: "#145"
                - text: health departments, medical societies, or other nonprofit organizations.
              - blockquote [ref=e507]: “b. An important function of counseling should be to simplify and expedite the provision of abortion services; it should not delay the obtaining of these services.
              - blockquote [ref=e508]: “c. Psychiatric consultation should not be mandatory. As in the case of other specialized medical services, psychiatric consultation should be sought for definite indications and not on a routine basis.
              - blockquote [ref=e509]: “d. A wide range of individuals from appropriately trained, sympathetic volunteers to highly skilled physicians may qualify as abortion counselors.
              - blockquote [ref=e510]: “e. Contraception and/or sterilization should be discussed with each abortion patient.” Recommended Standards for Abortion Services, 61 Am. J. Pub. Health 396 (1971).
              - paragraph [ref=e511]: "Among factors pertinent to life and health risks associated with abortion were three that “are recognized as important”:"
              - blockquote [ref=e512]: “a. the skill of the physician,
              - blockquote [ref=e513]: “b. the environment in which the abortion is performed, and above all
              - blockquote [ref=e514]:
                - text: “c. the duration of pregnancy, as determined by uterine size and confirmed by menstrual history.”
                - emphasis [ref=e515]: Id.,
                - text: at 397.
              - paragraph [ref=e516]:
                - text: It was said that “a well-equipped hospital” offers more protection “to cope with unforeseen difficulties than an office or clinic without such resources. . . . The factor of gestational age is of overriding importance.” Thus, it was recommended that abortions in the second trimester and early abortions in the presence of existing medical complications be performed in hospitals as inpatient procedures. For pregnancies in the first tri
                - link "*146 146" [ref=e517] [cursor=pointer]:
                  - /url: "#146"
                - text: mester, abortion in the hospital with or without overnight stay “is probably the safest practice.” An abortion in an extramural facility, however, is an acceptable alternative “provided arrangements exist in advance to admit patients promptly if unforeseen complications develop.” Standards for an abortion facility were listed. It was said that at present abortions should be performed by physicians or osteopaths who are licensed to practice and who have “adequate training.”
                - emphasis [ref=e518]: Id.,
                - text: at 398.
              - paragraph [ref=e519]:
                - text: "8."
                - emphasis [ref=e520]: The position of the American Bar Association.
                - text: At its meeting in February 1972 the ABA House of Delegates approved, with 17 opposing votes, the Uniform Abortion Act that had been drafted and approved the preceding August by the Conference of Commissioners on Uniform State Laws. 58 A. B. A. J. 380 (1972). We set forth the Act in full in the margin.40 The
                - link "*147 147" [ref=e521] [cursor=pointer]:
                  - /url: "#147"
                - text: Conference has appended an enlightening Prefatory-Note.41
              - paragraph [ref=e522]: VII
              - paragraph [ref=e523]: Three reasons have been advanced to explain historically the enactment of criminal abortion laws in the 19th century and to justify their continued existence.
              - paragraph [ref=e524]:
                - link "*148 148" [ref=e525] [cursor=pointer]:
                  - /url: "#148"
                - text: It has been argued occasionally that these laws were the product of a Victorian social concern to discourage illicit sexual conduct. Texas, however, does not advance this justification in the present case, and it appears that no court or commentator has taken the argument seriously.42 The appellants and
                - emphasis [ref=e526]: amici
                - text: contend, moreover, that this is not a proper state purpose at all and suggest that, if it were, the Texas statutes are overbroad in protecting it since the law fails to distinguish between married and unwed mothers.
              - paragraph [ref=e527]:
                - text: A second reason is concerned with abortion as a medical procedure. When most criminal abortion laws were first enacted, the procedure was a hazardous one for the woman.43 This was particularly true prior to the
                - link "*149 149" [ref=e528] [cursor=pointer]:
                  - /url: "#149"
                - text: development of antisepsis. Antiseptic techniques, of course, were based on discoveries by Lister, Pasteur, and others first announced in 1867, but were not generally accepted and employed until about the turn of the century. Abortion mortality was high. Even after 1900, and perhaps until as late as the development of antibiotics in the 1940’s, standard modern techniques such as dilation and curettage were not nearly so safe as they are today. Thus, it has been argued that a State’s real concern in enacting a criminal abortion law was to protect the pregnant woman, that is, to restrain her from submitting to a procedure that placed her life in serious jeopardy.
              - paragraph [ref=e529]:
                - text: Modern medical techniques have altered this situation. Appellants and various
                - emphasis [ref=e530]: amici
                - text: refer to medical data indicating that abortion in early pregnancy, that is, prior to the end of the first trimester, although not without its risk, is now relatively safe. Mortality rates for women undergoing early abortions, where the procedure is legal, appear to be as low as or lower than the rates for normal childbirth.44 Consequently, any interest of the State in protecting the woman from an inherently hazardous procedure, except when it would be equally dangerous for her to forgo it, has largely disappeared. Of course, important state interests in the areas of health and medical standards do remain.
                - link "*150 150" [ref=e531] [cursor=pointer]:
                  - /url: "#150"
                - text: The State has a legitimate interest in seeing to it that abortion, like any other medical procedure, is performed under circumstances that insure maximum safety for the patient. This interest obviously extends at least to the performing physician and his staff, to the facilities involved, to the availability of after-care, and to adequate provision for any complication or emergency that might arise. The prevalence of high mortality rates at illegal “abortion mills” strengthens, rather than weakens, the State’s interest in regulating the conditions under which abortions are performed. Moreover, the risk to the woman increases as her pregnancy continues. Thus, the State retains a definite interest in protecting the woman’s own health and safety when an abortion is proposed at a late stage of pregnancy.
              - paragraph [ref=e532]:
                - text: The third reason is the State’s interest — some phrase it in terms of duty — in protecting prenatal life. Some of the argument for this justification rests on the theory that a new human life is present from the moment of conception.45 The State’s interest and general obligation to protect life then extends, it is argued, to prenatal life. Only when the life of the pregnant mother herself is at stake, balanced against the life she carries within her, should the interest of the embryo or fetus not prevail. Logically, of course, a legitimate state interest in this area need not stand or fall on acceptance of the belief that life begins at conception or at some other point prior to live birth. In assessing the State’s interest, recognition may be given to the less rigid claim that as long as at least
                - emphasis [ref=e533]: potential
                - text: life is involved, the State may assert interests beyond the protection of the pregnant woman alone.
              - paragraph [ref=e534]:
                - link "*151 151" [ref=e535] [cursor=pointer]:
                  - /url: "#151"
                - text: Parties challenging state abortion laws have sharply disputed in some courts the contention that a purpose of these laws, when enacted, was to protect prenatal life.46 Pointing to the absence of legislative history to support the contention, they claim that most state laws were designed solely to protect the woman. Because medical advances have lessened this concern, at least with respect to abortion in early pregnancy, they argue that with respect to such abortions the laws can no longer be justified by any state interest. There is some scholarly support for this view of original purpose.47 The few state courts called upon to interpret their laws in the late 19th and early 20th centuries did focus on the State’s interest in protecting the woman’s health rather than in preserving the embryo and fetus.48 Proponents of this view point out that in many States, including Texas,49 by statute or judicial interpretation, the pregnant woman herself could not be prosecuted for self-abortion or for cooperating in an abortion performed upon her by another.50 They claim that adoption of the “quickening” distinction through received common
                - link "*152 152" [ref=e536] [cursor=pointer]:
                  - /url: "#152"
                - text: law and state statutes tacitly recognizes the greater health hazards inherent in late abortion and impliedly repudiates the theory that life begins at conception.
              - paragraph [ref=e537]: It is with these interests, and the weight to be attached to them, that this case is concerned.
              - paragraph [ref=e538]: VIII
              - paragraph [ref=e539]:
                - text: The Constitution does not explicitly mention any right of privacy. In a line of decisions, however, going back perhaps as far as
                - emphasis [ref=e540]: Union Pacific R. Co.
                - text: v.
                - emphasis [ref=e541]: Botsford,
                - link "141 U. S. 250, 251" [ref=e543] [cursor=pointer]:
                  - /url: /opinion/93149/union-pacific-railway-co-v-botsford/#251
                - text: (1891), the Court has recognized that a right of personal privacy, or a guarantee of certain areas or zones of privacy, does exist under the Constitution. In varying contexts, the Court or individual Justices have, indeed, found at least the roots of that right in the First Amendment,
                - emphasis [ref=e544]: Stanley
                - text: v.
                - emphasis [ref=e545]: Georgia,
                - link "394 U. S. 557, 564" [ref=e547] [cursor=pointer]:
