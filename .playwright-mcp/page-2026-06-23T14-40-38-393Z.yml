              - paragraph [ref=e330]:
                - text: But when, as here, pregnancy is a significant fact in the litigation, the normal 266-day human gestation period is so short that the pregnancy will come to term before the usual appellate process is complete. If that termination makes a case moot, pregnancy litigation seldom will survive much beyond the trial stage, and appellate review will be effectively denied. Our law should not be that rigid. Pregnancy often comes more than once to the same woman, and in the general population, if man is to survive, it will always be with us. Pregnancy provides a classic justification for a conclusion of nonmootness. It truly could be “capable of repetition, yet evading review.”
                - emphasis [ref=e331]: Southern Pacific Terminal Co.
                - text: v.
                - emphasis [ref=e332]: ICC,
                - link "219 U. S. 498, 515" [ref=e334] [cursor=pointer]:
                  - /url: /opinion/97365/southern-pacific-terminal-co-v-interstate-commerce-commission/#515
                - text: (1911). See
                - emphasis [ref=e335]: Moore
                - text: v.
                - emphasis [ref=e336]: Ogilvie,
