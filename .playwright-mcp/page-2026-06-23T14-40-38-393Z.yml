              - paragraph [ref=e778]: This conclusion, however, does not of itself fully answer the contentions raised by Texas, and we pass on to other considerations.
              - paragraph [ref=e779]:
                - text: B. The pregnant woman cannot be isolated in her ’privacy. She carries an embryo and, later, a fetus, if one accepts the medical definitions of the developing young in the human uterus. See Dorland’s Illustrated Medical Dictionary 478-479, 547 (24th ed. 1965). The situation therefore is inherently different from marital intimacy, or bedroom possession of obscene material, or marriage, or procreation, or education, with which
                - emphasis [ref=e780]:
                  - link "Eisenstadt" [ref=e782] [cursor=pointer]:
                    - /url: /opinion/108489/eisenstadt-v-baird/
                - text: and
                - emphasis [ref=e783]: Griswold, Stanley, Loving, Skinner,
                - text: and
                - emphasis [ref=e784]:
                  - link "Pierce" [ref=e786] [cursor=pointer]:
                    - /url: /opinion/100694/pierce-v-society-of-sisters/
                - text: and
                - emphasis [ref=e787]:
                  - link "Meyer" [ref=e789] [cursor=pointer]:
                    - /url: /opinion/100233/meyer-v-nebraska/
                - text: were respectively concerned. As we have intimated above, it is reasonable and appropriate for a State to decide that at some point in time another interest, that of health of the mother or that of potential human life, becomes significantly involved. The woman's privacy is no longer sole and any right of privacy she possesses must be measured accordingly.
              - paragraph [ref=e790]: Texas urges that, apart from the Fourteenth Amendment, life begins at conception and is present throughout pregnancy, and that, therefore, the State has a compelling interest in protecting that life from and after conception. We need not resolve the difficult question of when life begins. When those trained in the respective disciplines of medicine, philosophy, and theology are unable to arrive at any consensus, the judiciary, at this point in the development of man’s knowledge, is not in a position to speculate as to the answer.
              - paragraph [ref=e791]:
                - link "*160 160" [ref=e792] [cursor=pointer]:
                  - /url: "#160"
                - text: It should be sufficient to note briefly the wide divergence of thinking on this most sensitive and difficult question. There has always been strong support for the view that life does not begin until live birth. This was the belief of the Stoics.56 It appears to be the predominant, though not the unanimous, attitude of the Jewish faith.57 It may be taken to represent also the position of a large segment of the Protestant community, insofar as that can be ascertained; organized groups that have taken a formal position on the abortion issue have generally regarded abortion as a matter for the conscience of the individual and her family.58 As we have noted, the common law found greater significance in quickening. Physicians and their scientific colleagues have regarded that event with less interest and have tended to focus either upon conception, upon live birth, or upon the interim point at which the fetus becomes “viable,” that is, potentially able to live outside the mother’s womb, albeit with artificial aid.59 Viability is usually placed at about seven months (28 weeks) but may occur earlier, even at 24 weeks.60 The Aristotelian theory of “mediate animation,” that held sway throughout the Middle Ages and the Renaissance in Europe, continued to be official Roman Catholic dogma until the 19th century, despite opposition to this “ensoulment” theory from those in the Church who would recognize the existence of life from
                - link "*161 161" [ref=e793] [cursor=pointer]:
                  - /url: "#161"
                - text: the moment of conception.61 The latter is now, of course, the official belief of the Catholic Church. As one brief
                - emphasis [ref=e794]: amicus
                - text: discloses, this is a view strongly held by many non-Catholics as well, and by many physicians. Substantial problems for precise definition of this view are posed, however, by new embryological data that purport to indicate that conception is a “process” over time, rather than an event, and by new medical techniques such as menstrual extraction, the “morning-after” pill, implantation of embryos, artificial insemination, and even artificial wombs.62
              - paragraph [ref=e795]:
                - text: In areas other than criminal abortion, the law has been reluctant to endorse any theory that life, as we recognize it, begins before live birth or to accord legal rights to the unborn except in narrowly defined situations and except when the rights are contingent upon live birth. For example, the traditional rule of tort law denied recovery for prenatal injuries even though the child was born alive.63 That rule has been changed in almost every jurisdiction. In most States, recovery is said to be permitted only if the fetus was viable, or at least quick, when the injuries were sustained, though few
                - link "*162 162" [ref=e796] [cursor=pointer]:
                  - /url: "#162"
                - text: courts have squarely so held.64 In a recent development, generally opposed by the commentators, some States permit the parents of a stillborn child to maintain an action for wrongful death because of prenatal injuries.65 Such an action, however, would appear to be one to vindicate the parents’ interest and is thus consistent with the view that the fetus, at most, represents only the potentiality of life. Similarly, unborn children have been recognized as acquiring rights or interests by way of inheritance or other devolution of property, and have been represented by guardians
                - emphasis [ref=e797]: ad litem.
                - emphasis [ref=e799] [cursor=pointer]: "66"
                - emphasis [ref=e800]
                - text: Perfection of the interests involved, again, has generally been contingent upon live birth. In short, the unborn have never been recognized in the law as persons in the whole sense.
              - paragraph [ref=e801]: X
              - paragraph [ref=e802]:
                - text: In view of all this, we do not agree that, by adopting one theory of life, Texas may override the rights of the pregnant woman that are at stake. We repeat, however, that the State does have an important and legitimate interest in preserving and protecting the health of the pregnant woman, whether she be a resident of the State or a nonresident who seeks medical consultation and treatment there, and that it has still
                - emphasis [ref=e803]: another
                - text: important and legitimate interest in protecting the potentiality of human life. These interests are separate and distinct. Each grows in substantiality as the woman approaches
                - link "*163 163" [ref=e804] [cursor=pointer]:
                  - /url: "#163"
                - text: term and, at a point during pregnancy, each becomes “compelling.”
              - paragraph [ref=e805]: With respect to the State’s important and legitimate interest in the health of the mother, the “compelling” point, in the light of present medical knowledge, is at approximately the end of the first trimester. This is so because of the now-established medical fact, referred to above at 149, that until the end of the first trimester mortality in abortion may be less than mortality in normal childbirth, ft follows that, from and after this point, a State may regulate the abortion procedure to the extent that the regulation reasonably relates to the preservation and protection of maternal health. Examples of permissible state regulation in this area are requirements as to the qualifications of the person who is to perform the abortion; as to the licensure of that person; as to the facility in which the procedure is to be performed, that is, whether it must be a hospital or may be a clinic or some other place of less-than-hospital status; as to the licensing of the facility; and the like.
              - paragraph [ref=e806]: This means, on the other hand, that, for the period of pregnancy prior to this “compelling” point, the attending physician, in consultation with his patient, is free to determine, without regulation by the State, that, in his medical judgment, the patient’s pregnancy should be terminated. If that decision is reached, the judgment may be effectuated by an abortion free of interference by the State.
              - paragraph [ref=e807]:
                - text: With respect to the State’s important and legitimate interest in potential life, the “compelling” point is at viability. This is so because the fetus then presumably has the capability of meaningful life outside the mother’s womb. State regulation protective of fetal life after viability thus has both logical and biological justifications. If the State is interested in protecting fetal life after viability, it may go so far as to proscribe abortion
                - link "*164 164" [ref=e808] [cursor=pointer]:
                  - /url: "#164"
                - text: during that period, except when it is necessary to preserve the life or health of the mother.
              - paragraph [ref=e809]: Measured against these standards, Art. 1196 of the Texas Penal Code, in restricting legal abortions to those “procured or attempted by medical advice for the purpose of saving the life of the mother,” sweeps too broadly. The statute makes no distinction between abortions performed early in pregnancy and those performed later, and it limits to a single reason, “saving” the mother’s life, the legal justification for the procedure. The statute, therefore, cannot survive the constitutional attack made upon it here.
              - paragraph [ref=e810]:
                - text: This conclusion makes it unnecessary for us to consider the additional challenge to the Texas statute asserted on grounds of vagueness. See
                - emphasis [ref=e811]: United States
                - text: v.
                - emphasis [ref=e812]: Vuitch,
                - link "402 U. S., at 67-72" [ref=e814] [cursor=pointer]:
                  - /url: /opinion/108322/united-states-v-vuitch/#67
                - text: .
              - paragraph [ref=e815]: XI
              - paragraph [ref=e816]: "To summarize and to repeat:"
              - paragraph [ref=e817]:
                - text: 1. A state criminal abortion statute of the current Texas type, that excepts from criminality only a
                - emphasis [ref=e818]: lifesaving
                - text: procedure on behalf of the mother, without regard to pregnancy stage and without recognition of the other interests involved, is violative of the Due Process Clause of the Fourteenth Amendment.
              - paragraph [ref=e819]: (a) For the stage prior to approximately the end of the first trimester, the abortion decision and its effectuation must be left to the medical judgment of the pregnant woman’s attending physician.
              - paragraph [ref=e820]: (b) For the stage subsequent to approximately the end of the first trimester, the State, in promoting its interest in the health of the mother, may, if it chooses, regulate the abortion procedure in ways that are reasonably related to maternal health.
              - paragraph [ref=e821]:
                - text: (c) For the stage subsequent to viability, the State in promoting its interest in the potentiality of human life
                - link "*165 165" [ref=e822] [cursor=pointer]:
                  - /url: "#165"
                - text: may, if it chooses, regulate, and even proscribe, abortion except where it is necessary, in appropriate medical judgment, for the preservation of the life or health of the mother.
              - paragraph [ref=e823]: 2. The State may define the term “physician,” as it has been employed in the preceding paragraphs of this Part XI of this opinion, to mean only a physician currently licensed by the State, and may proscribe any abortion by a person who is not a physician as so defined.
              - paragraph [ref=e824]:
                - text: In
                - emphasis [ref=e825]: Doe
                - text: v.
                - emphasis [ref=e826]: Bolton, post,
                - text: p. 179, procedural requirements contained in one of the modern abortion statutes are considered. That opinion and this one, of course, are to be read together.67
              - paragraph [ref=e827]:
                - text: This holding, we feel, is consistent with the relative weights of the respective interests involved, with the lessons and examples of medical and legal history, with the lenity of the common law, and with the demands of the profound problems of the present day. The decision leaves the State free to place increasing restrictions on abortion as the period of pregnancy lengthens, so long as those restrictions are tailored to the recognized state interests. The decision vindicates the right of the physician to administer medical treatment according to his professional judgment up to the points where important
                - link "*166 166" [ref=e828] [cursor=pointer]:
                  - /url: "#166"
                - text: state interests provide compelling justifications for intervention. Up to those points, the abortion decision in all its aspects is inherently, and primarily, a medical decision, and basic responsibility for it must rest with the physician. If an individual practitioner abuses the privilege of exercising proper medical judgment, the usual remedies, judicial and intra-professional, are available.
              - paragraph [ref=e829]: XII
              - paragraph [ref=e830]: Our conclusion that Art. 1196 is unconstitutional means, of course, that the Texas abortion statutes, as a unit, must fall. The exception of Art. 1196 cannot be struck down separately, for then the State would be left with a statute proscribing all abortion procedures no matter how medically urgent the case.
              - paragraph [ref=e831]:
                - text: Although the District Court granted appellant Roe declaratory relief, it stopped short of issuing an injunction against enforcement of the Texas statutes. The Court has recognized that different considerations enter into a federal court’s decision as to declaratory relief, on the one hand, and injunctive relief, on the other.
                - emphasis [ref=e832]: Zwickler
                - text: v.
                - emphasis [ref=e833]: Koota,
                - link "389 U. S. 241, 252-255" [ref=e835] [cursor=pointer]:
                  - /url: /opinion/107553/zwickler-v-koota/#252
                - text: (1967);
                - emphasis [ref=e836]: Dombrowski
                - text: v.
                - emphasis [ref=e837]: Pfister,
                - link "380 U. S. 479" [ref=e839] [cursor=pointer]:
                  - /url: /opinion/107025/dombrowski-v-pfister/
                - text: (1965). We are not dealing with a statute that, on its face, appears to abridge free expression, an area of particular concern under
                - emphasis [ref=e840]:
                  - link "Dombrowski" [ref=e842] [cursor=pointer]:
                    - /url: /opinion/107025/dombrowski-v-pfister/
                - text: and refined in
                - emphasis [ref=e843]: Younger
                - text: v.
                - emphasis [ref=e844]: Harris,
                - link "401 U. S., at 50" [ref=e846] [cursor=pointer]:
                  - /url: /opinion/108263/younger-v-harris/#50
                - text: .
              - paragraph [ref=e847]: We find it unnecessary to decide whether the District Court erred in withholding injunctive relief, for we assume the Texas prosecutorial authorities will give full credence to this decision that the present criminal abortion statutes of that State are unconstitutional.
              - paragraph [ref=e848]:
                - text: The judgment of the District Court as to intervenor Hallford is reversed, and Dr. Hallford’s complaint in intervention is dismissed. In all other respects, the judg
