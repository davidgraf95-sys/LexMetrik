              - generic [ref=e1086]:
                - text: "40"
                - paragraph [ref=e1087]: “UNIFORM ABORTION ACT
                - blockquote [ref=e1088]:
                  - text: “Section 1.
                  - emphasis [ref=e1089]: "[Abortion Defined; When Authorized.']"
                - blockquote [ref=e1090]: “(a) ‘Abortion’ means the termination of human pregnancy with an intention other than to produce a live birth or to remove a dead fetus.
                - blockquote [ref=e1091]: "“(b) An abortion may be performed in this state only if it is performed:"
                - blockquote [ref=e1092]: “(1) by a physician licensed to practice medicine [or osteopathy] in this state or by a physician practicing medicine [or osteopathy] in the employ of the government of the United States or of this state, [and the abortion is performed [in the physician’s office or in a medical clinic, or] in a hospital approved by the [Department of Health] or operated by the United States, this state, or any department, agency, or political subdivision of either;] or by a female upon herself upon the advice of the physician; and
                - blockquote [ref=e1093]:
                  - text: “(2) within [20] weeks after the commencement of the pregnancy [or after [20] weeks only if the physician has reasonable cause to believe (i) there is a substantial risk that continuance of the pregnancy would endanger the life of the mother or would gravely impair the physical or mental health of the mother, (ii) that the child would be born with grave physical or mental defect, or (iii) that
                  - link "*147" [ref=e1094] [cursor=pointer]:
                    - /url: "#147"
                  - text: the pregnancy resulted from rape or incest, or illicit intercourse with a girl under the age of 16 years],
                - blockquote [ref=e1095]: “Section 2. [Penalty.] Any person who performs or procures an abortion other than authorized by this Act is guilty of a [felony] and, upon conviction thereof, may be sentenced to pay a fine not exceeding [$1,000] or to imprisonment [in the state penitentiary] not exceeding [5 years], or both.
                - blockquote [ref=e1096]:
                  - text: “Section 3.
                  - emphasis [ref=e1097]: "[Uniformity of"
                  - text: Interpretation.] This Act shall be construed to effectuate its general purpose to make uniform the law with respect to the subject of this Act among those states which enact it.
                - blockquote [ref=e1098]:
                  - text: “Section 4.
                  - emphasis [ref=e1099]: "[Short Titled"
                  - text: This Act may be cited as the Uniform Abortion Act.
                - blockquote [ref=e1100]:
                  - text: “Section 5.
                  - emphasis [ref=e1101]: "[Severability.2"
                  - text: If any provision of this Act or the application thereof to any person or circumstance is held invalid, the invalidity does not affect other provisions or applications of this Act which can be given effect without the invalid provision or application, and to this end the provisions of this Act are severable.
                - blockquote [ref=e1102]: "“Section 6. [Repeal.] The following acts and parts of acts are repealed:"
                - blockquote [ref=e1103]: “(1)
                - blockquote [ref=e1104]: “(2)
                - blockquote [ref=e1105]: “(3)
                - blockquote [ref=e1106]:
                  - text: “Section 7.
                  - emphasis [ref=e1107]: "[Time of Taking"
                  - text: Effect.] This Act shall take effect-.”
