              - generic [ref=e76]: 29. Auszug aus dem Urteil der I. zivilrechtlichen Abteilung i.S. A. AG gegen B. AG (Beschwerde in Zivilsachen)
              - generic [ref=e77]: 4A_571/2015 vom 29. Februar 2016
              - generic [ref=e79]:
                - generic [ref=e80]: Regeste
                - generic [ref=e81]:
                  - text: Einrede der abgeurteilten Sache (res iudicata); Streitgegenstand.
                  - generic [ref=e82]: "Bestimmung des Streitgegenstands bei Einrede der abgeurteilten Sache: Welche Rechtsbegehren im früheren Verfahren gestellt und auf welchen Lebenssachverhalt die eingeklagten Ansprüche gestützt wurden, ergibt sich aus den Erwägungen des früheren Urteils (E. 2-4)."
              - generic [ref=e85]: Sachverhalt ab Seite 210
              - generic [ref=e89]: BGE 142 III 210 S. 210
              - generic [ref=e90]:
                - text: A. Die A. AG (Klägerin, Beschwerdeführerin, Feststellungsbeklagte) betrieb die B. AG (Beklagte, Beschwerdegegnerin, Feststellungsklägerin) mit Zahlungsbefehl Nr. x des Betreibungsamts Bern-Mittelland vom 19. Dezember 2006 für einen Betrag von Fr. 999'000.-. Als Forderungsgrund gab sie an "Schadenersatz, Genugtuung. Dient zur Unterbrechung der Verjährungsfrist". Die Beklagte erhob Rechtsvorschlag und reichte in der Folge am 26. bzw. 30. Januar 2007 ein
                - generic [ref=e93]: BGE 142 III 210 S. 211
                - text: Gesuch um Vorladung zum Aussöhnungsversuch, nach dessen Scheitern eine Klage beim Richteramt Solothurn-Lebern ein mit dem Begehren auf Feststellung, dass die von der Klägerin in Betreibung gesetzte Forderung nicht besteht. Das Richteramt hiess die negative Feststellungsklage am 16. Juni 2010 gut und stellte fest, dass die von der Feststellungsbeklagten in Betreibung gesetzte Forderung nicht besteht. Gleich entschied auf Appellation der Feststellungsbeklagten auch das Obergericht des Kantons Solothurn am 8. März 2011. Das Betreibungsamt Bern-Mittelland wurde angewiesen, die Betreibung Nr. x aus dem Betreibungsregister zu löschen.
              - generic [ref=e94]: B. Parallel zum Verfahren im Kanton Solothurn gelangte die Klägerin nach erfolglosem Aussöhnungsversuch am 14. Februar 2008 an das Handelsgericht des Kantons Bern. Sie beantragte, die Beklagte sei zu insgesamt Fr. 298'767.90 nebst Zins (u.a. für Verwaltungshonorar, Vergütung administrativer Dienstleistungen) zu verurteilen und der Rechtsvorschlag in der Betreibung Nr. x des Betreibungsamtes Bern-Mittelland sei in diesem Umfang zu beseitigen. Das Handelsgericht des Kantons Bern sistierte mit Verfügung vom 25. Februar 2008 das Verfahren bis zum Abschluss des solothurnischen Verfahrens. Nachdem das Urteil des Obergerichts des Kantons Solothurn unangefochten blieb, hob das Handelsgericht des Kantons Bern die Sistierung mit Verfügung vom 14. Juli 2011 auf und gab der Klägerin Gelegenheit, ihre Klage zu überarbeiten. Die Klägerin reichte darauf am 11. August 2011 ihre revidierte Klage ein; die Klagebegehren änderte sie insofern ab, als sie das Begehren auf Beseitigung des Rechtsvorschlags fallen liess und sich neu Mehrforderungen vorbehielt. Am 14. August 2014 beschloss das Handelsgericht, das Verfahren auf die Frage des Vorliegens einer bereits abgeurteilten Sache zu beschränken.
              - generic [ref=e96]:
                - text: Mit Entscheid vom 8. September 2015 (ausgefertigt am 14. September 2015) wies das Handelsgericht des Kantons Bern die Klage zurück. Das Gericht gelangte zum Schluss, dass die von Amtes wegen zu prüfende Prozessvoraussetzung fehle, wonach die Streitsache nicht bereits rechtskräftig beurteilt wurde. Es hielt im angefochtenen Urteil zunächst fest, mit dem Urteil des Obergerichts des Kantons Solothurn vom 8. März 2011 liege ein Sachurteil vor, das der vorliegenden Klage als res iudicata im Wege stehen könne. Zur Identität des Streitgegenstandes erwog das Handelsgericht, dass sich der Streitgegenstand des früheren Verfahrens nach dem Dispositiv des Urteils bestimme, das jedoch im Lichte der Urteilserwägungen auszulegen
                - generic [ref=e98]: BGE 142 III 210 S. 212
                - text: sei. Dabei genüge die Konsultation der Urteilserwägungen nicht in jedem Fall, sondern allenfalls könne erforderlich sein, auf weitere Unterlagen zurückzugreifen. In Auslegung der Rechtsbegehren und Klageschrift der Beklagten im Verfahren vor den solothurnischen Gerichten gelangte das Handelsgericht zum Schluss, der Lebenssachverhalt, den die Beklagte im Verfahren um negative Feststellung vor den Gerichten des Kantons Solothurns zur Beurteilung gestellt habe, sei derselbe wie der im Verfahren vor Handelsgericht streitige.
              - generic [ref=e99]: C. Mit Beschwerde in Zivilsachen stellt die Klägerin das Rechtsbegehren, der Entscheid des Handelsgerichts des Kantons Bern vom 8. September 2015 sei aufzuheben und auf die Klage vom 14. Februar 2008/11. August 2011 sei einzutreten.
              - generic [ref=e101]: Das Bundesgericht heisst die Beschwerde gut, hebt den Entscheid des Handelsgerichts des Kantons Bern vom 8. September 2015 auf und weist die Sache an die Vorinstanz zur weiteren Beurteilung zurück.
              - generic [ref=e102]: (Zusammenfassung)
