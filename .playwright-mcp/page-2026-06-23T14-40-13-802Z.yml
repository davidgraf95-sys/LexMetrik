              - generic [ref=e106]:
                - text: 2. Materielle Rechtskraft bedeutet Massgeblichkeit eines formell rechtskräftigen Urteils in jedem späteren Verfahren unter denselben Parteien. Sie hat eine positive und eine negative Wirkung. In positiver Hinsicht bindet die materielle Rechtskraft das Gericht in einem späteren Prozess an alles, was im Urteilsdispositiv des früheren Prozesses festgestellt wurde (sog. Präjudizialitäts- oder Bindungswirkung,
                - link "BGE 139 III 126" [ref=e108] [cursor=pointer]:
