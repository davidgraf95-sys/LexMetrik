                - text: E. 4a S. 478).
              - generic [ref=e111]:
                - text: 2.1 In negativer Hinsicht verbietet die materielle Rechtskraft jedem späteren Gericht, auf eine Klage einzutreten, deren Streitgegenstand mit dem rechtskräftig beurteilten (res iudicata, d.h. abgeurteilte Sache) identisch ist, sofern der Kläger nicht ein schutzwürdiges Interesse an der Wiederholung des früheren Entscheids geltend machen kann (
                - link "BGE 139 III 126" [ref=e113] [cursor=pointer]:
                  - /url: https://search.bger.ch/ext/eurospider/live/de/php/clir/http/index.php?lang=de&type=show_document&page=1&from_date=&to_date=&from_year=1954&to_year=2025&sort=relevance&insertion_date=&from_date_push=&top_subcollection_clir=bge&query_words=&part=all&de_fr=&de_it=&fr_de=&fr_it=&it_de=&it_fr=&orig=&translation=&rank=0&highlight_docid=atf%3A%2F%2F139-III-126%3Ade&number_of_ranks=0&azaclir=clir#page126
                - text: E. 3.1 S. 128;
                - link "BGE 121 III 474" [ref=e114] [cursor=pointer]:
                  - /url: https://search.bger.ch/ext/eurospider/live/de/php/clir/http/index.php?lang=de&type=show_document&page=1&from_date=&to_date=&from_year=1954&to_year=2025&sort=relevance&insertion_date=&from_date_push=&top_subcollection_clir=bge&query_words=&part=all&de_fr=&de_it=&fr_de=&fr_it=&it_de=&it_fr=&orig=&translation=&rank=0&highlight_docid=atf%3A%2F%2F121-III-474%3Ade&number_of_ranks=0&azaclir=clir#page474
                - text: E. 2 S. 477). Die materielle Rechtskraft eines Urteils erstreckt sich nach dem Grundsatz der Präklusion auf den individualisierten prozessualen Anspruch schlechthin und schliesst Angriffe auf sämtliche Tatsachen aus, die im Zeitpunkt des Urteils bereits bestanden hatten, unabhängig davon, ob sie den Parteien bekannt waren, von diesen vorgebracht oder vom Richter beweismässig als erstellt
                - generic [ref=e116]: BGE 142 III 210 S. 213
                - text: erachtet wurden (grundlegend
                - link "BGE 115 II 187" [ref=e117] [cursor=pointer]:
                  - /url: https://search.bger.ch/ext/eurospider/live/de/php/clir/http/index.php?lang=de&type=show_document&page=1&from_date=&to_date=&from_year=1954&to_year=2025&sort=relevance&insertion_date=&from_date_push=&top_subcollection_clir=bge&query_words=&part=all&de_fr=&de_it=&fr_de=&fr_it=&it_de=&it_fr=&orig=&translation=&rank=0&highlight_docid=atf%3A%2F%2F115-II-187%3Ade&number_of_ranks=0&azaclir=clir#page187
                - text: E. 3b S. 190;
                - link "BGE 139 III 126" [ref=e118] [cursor=pointer]:
                  - /url: https://search.bger.ch/ext/eurospider/live/de/php/clir/http/index.php?lang=de&type=show_document&page=1&from_date=&to_date=&from_year=1954&to_year=2025&sort=relevance&insertion_date=&from_date_push=&top_subcollection_clir=bge&query_words=&part=all&de_fr=&de_it=&fr_de=&fr_it=&it_de=&it_fr=&orig=&translation=&rank=0&highlight_docid=atf%3A%2F%2F139-III-126%3Ade&number_of_ranks=0&azaclir=clir#page126
                - text: E. 3.1 S. 129). Nach der bundesgerichtlichen Rechtsprechung beurteilt sich die Identität von Streitgegenständen im Hinblick auf die negative Wirkung der materiellen Rechtskraft nach den prozessualen Ansprüchen in den Klageanträgen und dem behaupteten Lebenssachverhalt, d.h. dem Tatsachenfundament, auf das sich die Klagebegehren stützen (
                - link "BGE 139 III 126" [ref=e119] [cursor=pointer]:
                  - /url: https://search.bger.ch/ext/eurospider/live/de/php/clir/http/index.php?lang=de&type=show_document&page=1&from_date=&to_date=&from_year=1954&to_year=2025&sort=relevance&insertion_date=&from_date_push=&top_subcollection_clir=bge&query_words=&part=all&de_fr=&de_it=&fr_de=&fr_it=&it_de=&it_fr=&orig=&translation=&rank=0&highlight_docid=atf%3A%2F%2F139-III-126%3Ade&number_of_ranks=0&azaclir=clir#page126
                - text: E. 3.2.3 S. 131;
                - link "BGE 136 III 123" [ref=e120] [cursor=pointer]:
                  - /url: https://search.bger.ch/ext/eurospider/live/de/php/clir/http/index.php?lang=de&type=show_document&page=1&from_date=&to_date=&from_year=1954&to_year=2025&sort=relevance&insertion_date=&from_date_push=&top_subcollection_clir=bge&query_words=&part=all&de_fr=&de_it=&fr_de=&fr_it=&it_de=&it_fr=&orig=&translation=&rank=0&highlight_docid=atf%3A%2F%2F136-III-123%3Ade&number_of_ranks=0&azaclir=clir#page123
                - text: E. 4.3.1 S. 126). Dabei ist der Begriff der Anspruchsidentität nicht grammatikalisch, sondern inhaltlich zu verstehen. Der neue prozessuale Anspruch ist deshalb trotz abweichender Umschreibung vom beurteilten nicht verschieden, wenn er in diesem bereits enthalten war oder wenn im neuen Verfahren das kontradiktorische Gegenteil zur Beurteilung gestellt wird (
                - link "BGE 139 III 126" [ref=e121] [cursor=pointer]:
                  - /url: https://search.bger.ch/ext/eurospider/live/de/php/clir/http/index.php?lang=de&type=show_document&page=1&from_date=&to_date=&from_year=1954&to_year=2025&sort=relevance&insertion_date=&from_date_push=&top_subcollection_clir=bge&query_words=&part=all&de_fr=&de_it=&fr_de=&fr_it=&it_de=&it_fr=&orig=&translation=&rank=0&highlight_docid=atf%3A%2F%2F139-III-126%3Ade&number_of_ranks=0&azaclir=clir#page126
                - text: E. 3.2.3 S. 131).
              - generic [ref=e122]:
                - text: 2.2 Ob die negative Prozessvoraussetzung der res iudicata beachtet wurde, prüft das Bundesgericht als Rechtsfrage frei. Das Bundesgericht ist zwar an die Feststellungen der Vorinstanz über den Prozesssachverhalt gebunden; aus den Feststellungen des angefochtenen Urteils ergibt sich, welche Ansprüche im hängigen Verfahren eingeklagt sind. Ob aber diese Ansprüche in einem früheren Urteil definitiv beurteilt wurden, ergibt sich nicht aus den Feststellungen des angefochtenen, sondern aus dem früheren Urteil, dessen Dispositiv die Rechtskraftwirkung entfaltet (
                - link "BGE 136 III 345" [ref=e124] [cursor=pointer]:
                  - /url: https://search.bger.ch/ext/eurospider/live/de/php/clir/http/index.php?lang=de&type=show_document&page=1&from_date=&to_date=&from_year=1954&to_year=2025&sort=relevance&insertion_date=&from_date_push=&top_subcollection_clir=bge&query_words=&part=all&de_fr=&de_it=&fr_de=&fr_it=&it_de=&it_fr=&orig=&translation=&rank=0&highlight_docid=atf%3A%2F%2F136-III-345%3Ade&number_of_ranks=0&azaclir=clir#page345
                - text: E. 2.1 S. 348 mit Hinweisen). Dieses frühere Urteil zieht das Bundesgericht für seine Entscheidung in gleicher Weise bei, wie es auch die Vorinstanz bei der Prüfung der Prozessvoraussetzung hätte tun müssen. Die Erwägungen des früheren Urteils sind nach konstanter Rechtsprechung zur Auslegung der Tragweite des Dispositivs des Vorentscheids heranzuziehen (
                - link "BGE 128 III 191" [ref=e125] [cursor=pointer]:
                  - /url: https://search.bger.ch/ext/eurospider/live/de/php/clir/http/index.php?lang=de&type=show_document&page=1&from_date=&to_date=&from_year=1954&to_year=2025&sort=relevance&insertion_date=&from_date_push=&top_subcollection_clir=bge&query_words=&part=all&de_fr=&de_it=&fr_de=&fr_it=&it_de=&it_fr=&orig=&translation=&rank=0&highlight_docid=atf%3A%2F%2F128-III-191%3Ade&number_of_ranks=0&azaclir=clir#page191
                - text: E. 4a S. 195;
                - link "BGE 125 III 8" [ref=e126] [cursor=pointer]:
                  - /url: https://search.bger.ch/ext/eurospider/live/de/php/clir/http/index.php?lang=de&type=show_document&page=1&from_date=&to_date=&from_year=1954&to_year=2025&sort=relevance&insertion_date=&from_date_push=&top_subcollection_clir=bge&query_words=&part=all&de_fr=&de_it=&fr_de=&fr_it=&it_de=&it_fr=&orig=&translation=&rank=0&highlight_docid=atf%3A%2F%2F125-III-8%3Ade&number_of_ranks=0&azaclir=clir#page8
                - text: E. 3b S. 13;
                - link "BGE 123 III 16" [ref=e127] [cursor=pointer]:
                  - /url: https://search.bger.ch/ext/eurospider/live/de/php/clir/http/index.php?lang=de&type=show_document&page=1&from_date=&to_date=&from_year=1954&to_year=2025&sort=relevance&insertion_date=&from_date_push=&top_subcollection_clir=bge&query_words=&part=all&de_fr=&de_it=&fr_de=&fr_it=&it_de=&it_fr=&orig=&translation=&rank=0&highlight_docid=atf%3A%2F%2F123-III-16%3Ade&number_of_ranks=0&azaclir=clir#page16
                - text: E. 2a S. 18 f.). Aus diesen Erwägungen des massgebenden früheren Urteils ergibt sich nicht nur, welche Rechtsbegehren im früheren Verfahren gestellt wurden, sondern auch, auf welchen Lebenssachverhalt die eingeklagten Ansprüche gestützt wurden.
              - generic [ref=e128]:
                - text: 2.3 Für einen weitergehenden Beizug der Verfahrensakten des Vorentscheids besteht entgegen der Ansicht der Vorinstanz keine Grundlage. Dass sich die Identität des Streitgegenstands nach den prozessualen Ansprüchen in den Klageanträgen und dem behaupteten Lebenssachverhalt beurteilt, ist entgegen der Ansicht der Vorinstanz nicht so zu verstehen, dass die Akten des früheren Verfahrens beizuziehen sind, um den Streitgegenstand dieses früheren Prozesses unabhängig von den Urteilserwägungen zu bestimmen. Die Begründung
                - generic [ref=e131]: BGE 142 III 210 S. 214
                - text: des früheren Urteils ist vielmehr verbindlich zur Bestimmung der Tragweite der Rechtskraftwirkung dieses Urteils. Nach dessen Feststellungen beurteilt sich, welche Rechtsbegehren gestellt und welcher Sachverhalt behauptet wurde. An der Rechtskraftwirkung des Urteilsdispositivs können dagegen allfällige Sachvorbringen nicht teilhaben, welche - unter Umständen zu Unrecht - weder beurteilt noch in der Begründung erwähnt wurden. Es geht auch unter dem Titel der Bestimmung des Streitgegenstands nicht an, das Vorurteil einer materiellen Prüfung zu unterziehen. Darauf liefe es aber hinaus, wenn aufgrund der früheren Akten zu prüfen wäre, ob allenfalls die Tragweite des materiell rechtskräftigen Dispositivs weiter gefasst werden müsse, weil das früher zuständige Gericht gewisse Ansprüche zu Unrecht nicht berücksichtigt habe.
              - generic [ref=e132]: 2.4 Im Verfahren vor der Vorinstanz hat die Beschwerdeführerin verschiedene Forderungen eingeklagt. Nach den Feststellungen der Vorinstanz stehen diese in Zusammenhang mit der Sport- und Mehrzweckhalle in V., welche die Beklagte in Zusammenarbeit mit der Klägerin und weiteren Personen erstellte und alsdann auch betrieb. Sie lassen sich nach den Erwägungen im angefochtenen Entscheid auf vier verschiedene Sachverhaltskomplexe stützen, nämlich (1) den Lieferungen und Leistungen der Klägerin in Zusammenhang mit dem Bau der Mehrzweckhalle in V., insbesondere dem Stahlbau der Halle, (2) die Verwaltung der Halle, namentlich deren Vermietung durch die Klägerin sowie die C. AG, die ihre Ansprüche an die Klägerin zedierte, (3) die Leitung und Buchhaltung der Beklagten durch die Einzelfirma D. sowie die E. AG, welche ihre Ansprüche an die Klägerin zedierten, sowie (4) das Darlehen von F. an die Beklagte, wobei die Ansprüche wiederum an die Klägerin zediert worden sind. Die Forderungen für diese Leistungen der Klägerin sind nach dem Schluss der Vorinstanz durch das Obergericht des Kantons Solothurn im Urteil vom 8. März 2011 rechtskräftig beurteilt worden.
              - generic [ref=e134]: "Das Dispositiv dieses Urteils vom 8. März 2011 lautet wie folgt:"
              - generic [ref=e135]: "\"1. Die negative Feststellungsklage wird gutgeheissen und es wird festgestellt, dass die von der Beklagten mit Zahlungsbefehl Nr. x des Betreibungsamtes Bern-Mittelland, Dienststelle Bern, in Betreibung gesetzte Forderung von CHF 999'000.00 gegen die Klägerin nicht besteht."
              - generic [ref=e136]: 2. Das Betreibungsamt Bern-Mittelland, Dienststelle Bern, wird angewiesen, die Betreibung Nr. x aus dem Betreibungsregister zu löschen.
              - generic [ref=e137]: (3. Kosten)."
              - generic [ref=e140]: BGE 142 III 210 S. 215
              - generic [ref=e141]: 3. Mit der Vorinstanz ist grundsätzlich davon auszugehen, dass das Obergericht des Kantons Solothurn mit der Gutheissung der negativen Feststellungsklage der Beklagten materiell erkannt hat, dass die in Betreibung gesetzte Forderung der Klägerin von Fr. 999'000.- nicht besteht. Da unbestritten ist, dass sich der massgebende Lebenssachverhalt nicht verändert hat, ist der neue prozessuale Anspruch der Beschwerdeführerin gegen die Beschwerdegegnerin trotz abweichender Umschreibung vom beurteilten inhaltlich nicht verschieden, wenn die Klägerin im vorliegenden Verfahren vor dem Handelsgericht diejenigen Forderungen gegen die Beklagte erhebt, deren Nichtbestand das Obergericht des Kantons Solothurn im Urteil vom 8. März 2011 rechtskräftig festgestellt hat.
              - generic [ref=e143]: 3.1 Das Obergericht des Kantons Solothurn hat im Urteil vom 8. März 2011 die Appellation der Beschwerdeführerin abgewiesen und festgestellt, dass die in Betreibung gesetzte Forderung von Fr. 999'000.- nicht besteht. In der Begründung des Obergerichtsurteils vom 8. März 2011 werden die Anträge der Parteien im Rechtsmittelverfahren wiedergegeben. Die Beschwerdeführerin hatte als damalige Beklagte im Feststellungsverfahren in ihren Appellationsanträgen den Antrag gestellt, die negative Feststellungsklage der Beschwerdegegnerin sei abzuweisen, soweit darin die Feststellung des Nichtbestandes konkret bezeichneter Forderungen im Gesamtbetrag von Fr. 343'866.60 verlangt werde. Die Appellationsbegehren enthielten in Ziffern 1 bis 5 Teilforderungen, die unter kurzen Hinweisen zusammengefasst ("Stahlbau", "Liegenschaftsverwaltungshonorar", "Honorar für Buchhaltung und für Administration", "Darlehen") und (mit Rechnungsnummern) charakterisiert sind. Die Appellationsanträge, welche die Beschwerdeführerin als Beklagte im Verfahren auf negative Feststellung vor den Gerichten des Kantons Solothurn gestellt hat, stimmen inhaltlich mit den Rechtsbegehren überein, die sie als Klägerin vor der Vorinstanz gestellt hat.
              - generic [ref=e145]:
                - text: 3.2 Das Obergericht des Kantons Solothurn hat im Urteil vom 8. März 2011 zum damaligen Prozesssachverhalt festgehalten, dass die Beschwerdegegnerin als damalige Klägerin mit ihrem Rechtsbegehren beim Richteramt Solothurn-Lebern die Feststellung beantragt hatte, die von der Beschwerdeführerin gegen sie in Betreibung gesetzte Forderung bestehe nicht, wobei in der Betreibung als Forderungsgrund genannt werde "Schadenersatz; Genugtuung; Dient zur Unterbrechung der Verjährungsfrist".
                - generic [ref=e148]: BGE 142 III 210 S. 216
              - generic [ref=e149]: 3.2.1 Nach den Feststellungen des Obergerichts forderte der erstinstanzliche Gerichtspräsident - nach einem Zwischenverfahren betreffend das Feststellungsinteresse der damaligen Klägerin - die Beschwerdeführerin auf, ihre einlässliche Klageantwort einzureichen. Darauf stellte die Beschwerdeführerin als Beklagte im damaligen negativen Feststellungsprozess den Antrag, "die Klage sei abzuweisen, soweit darin die Feststellung des Nichtbestandes von Forderungen im Gesamtbetrag von Fr. 343'467.10 (recte Fr. 343'866.60) aus Werkvertrag, Liegenschaftsverwaltungshonorar, Honorar für Buchhaltung und Administration und Darlehen verlangt werde". Das Amtsgericht Solothurn-Lebern hiess darauf am 16. Juni 2010 die negative Feststellungsklage der Beschwerdegegnerin vollumfänglich gut.
              - generic [ref=e151]: 3.2.2 Das Obergericht des Kantons Solothurn bestätigte den erstinstanzlichen Entscheid im hier massgebenden rechtskräftigen Urteil im Wesentlichen mit der Begründung, die Beschwerdeführerin habe wiederholt eingestanden, dass sie gegenüber der Beschwerdegegnerin gar keine Forderung in der Höhe von Fr. 999'000.- habe und dass es sich bei den ihrer Meinung nach gegenüber der Beschwerdegegnerin bestehenden Forderungen um solche aus Werkvertrag und Darlehen sowie um Honorarforderungen handle, was ihre Rechtsbegehren in den Klageantworten deutlich dokumentierten. Das Obergericht hielt damit für erstellt, dass die Beschwerdeführerin im Zeitpunkt der Betreibung keine fälligen Schadenersatz- oder Genugtuungsforderungen hatte. Es schloss damit auf das Nichtbestehen der in Betreibung gesetzten Schuld, zumal sich der im Zahlungsbefehl genannte Forderungsgrund "Dient zur Unterbrechung der Verjährungsfrist" nur auf die gleichzeitig genannten Forderungsgründe "Schadenersatz" und "Genugtuung" beziehen könne.
              - generic [ref=e153]:
                - text: 3.2.3 Die Vorbringen der Beschwerdeführerin, in denen sie die Befürchtung äusserte, ihre Forderungen aus Werkvertrag, Auftrag und Darlehen zu verlieren, weil die erste Instanz zwar Ausführungen zu diesen Forderungen gemacht, diese dann aber doch nicht beurteilt habe, verwarf das Obergericht mit der Erwägung, die Beschwerdeführerin hätte nicht seitenlange Ausführungen in Klageantwort und Appellationseingabe zu ihren Forderungen aus Werkvertrag, Auftrag und Darlehen machen müssen, wenn sie ihre Forderung nicht durch das Richteramt Solothurn-Lebern hätte beurteilen lassen wollen. Es wäre ihr vielmehr freigestanden, die Betreibung zurückzuziehen, eine neue Betreibung anzuheben oder Klage einzureichen. Dass sich die erste
                - generic [ref=e156]: BGE 142 III 210 S. 217
                - text: Instanz unnötigerweise rudimentär zu den Forderungen aus Werkvertrag etc. geäussert habe, ändere nichts daran, dass die in Betreibung gesetzten Forderungen aus Schadenersatz und Genugtuung nicht beständen. Es könne keine Rede davon sein, dass das Amtsgericht den Prozess an sich gezogen, aber dann doch die sich stellenden Fragen nicht beurteilt habe - zumal lediglich das Urteilsdispositiv in Rechtskraft erwachse.
              - generic [ref=e157]: 3.3 Zur Bestimmung des Streitgegenstands im Verfahren vor den Solothurner Gerichten ist damit von folgenden Feststellungen auszugehen. Die Beschwerdeführerin hat eine Forderung gegen die Beschwerdegegnerin über Fr. 999'000.- mit der Begründung "Schadenersatz", "Genugtuung", "Dient zur Unterbrechung der Verjährungsfrist" in Betreibung gesetzt. Die Beschwerdegegnerin hat in ihrer negativen Feststellungsklage die Feststellung beantragt, dass die in Betreibung gesetzte Forderung nicht bestehe. Das Obergericht des Kantons Solothurn hat rechtskräftig festgestellt, dass die in Betreibung gesetzte Forderung nicht besteht. Die Ansichten darüber, welche Forderung die Beschwerdeführerin gegen die Beschwerdegegnerin in Betreibung gesetzt hat, gehen auseinander. Während das Obergericht des Kantons Solothurn in der Begründung des Urteils vom 8. März 2011 annimmt, die Beschwerdeführerin habe ausschliesslich Schadenersatz- und Genugtuungsforderungen in Betreibung gesetzt, geht die Vorinstanz (Handelsgericht des Kantons Bern) davon aus, Gegenstand des Prozesses im Verfahren vor den Solothurner Gerichten seien auch die hier eingeklagten Forderungen der Beschwerdeführerin gewesen; denn die damalige Beklagte und heutige Klägerin habe ebendiese Forderungen nach den verbindlichen Feststellungen des Obergerichts des Kantons Solothurn in ihrer Klageantwort und in der Appellation zur Begründung der (teilweisen) Abweisung der negativen Feststellungsklage in den Prozess eingebracht.
              - generic [ref=e159]:
                - text: 4. Die Beschwerdegegnerin hat in ihren Rechtsbegehren vor den Solothurner Gerichten namentlich die Feststellung verlangt, dass die von der Beklagten mit Zahlungsbefehl Nr. x des Betreibungsamtes Bern-Mittelland, Dienststelle Bern, in Betreibung gesetzte Forderung von Fr. 999'000.- gegen sie nicht besteht. Sie hat mit dieser Begründung die Löschung der Betreibung aus dem Register begehrt (Klageantrag 2 der damaligen Klage). Das Obergericht des Kantons Solothurn hat in der Begründung seines Urteils vom 8. März 2011 angenommen, die in Betreibung gesetzte Geldforderung sei mit der
                - generic [ref=e162]: BGE 142 III 210 S. 218
                - text: Angabe des Zahlungsgrundes im Betreibungsbegehren tituliert; es hat in den Erwägungen des Urteils vom 8. März 2011 daher ausdrücklich festgehalten, die negative Feststellung im Urteil beziehe sich - wie schon die Betreibung - nur auf Forderungen der Beschwerdeführerin aus Schadenersatz oder Genugtuung. Die Vorinstanz hat indes die Rechtsbegehren und Sachverhaltsvorbringen beider Parteien im negativen Feststellungsprozess herangezogen und geschlossen, die von der Beschwerdeführerin als Beklagte im damaligen Prozess zur Begründung der teilweisen Abweisung angeführten Forderungen hätten Streitgegenstand gebildet und seien - da sie mit den hier eingeklagten Forderungen übereinstimmten - daher im Solothurner Urteil vom 8. März 2011 rechtskräftig beurteilt worden.
              - generic [ref=e163]:
                - text: 4.1 Mit dem Betreibungsbegehren über Fr. 999'000.- und der Angabe des Zahlungsgrundes "Schadenersatz; Genugtuung; Dient zur Unterbrechung der Verjährungsfrist" hat zwar die Beschwerdeführerin die Beschwerdegegnerin einstweilen nur zur Zahlung oder zur Stellungnahme zu ihrer behaupteten Forderung aufgefordert. Denn nach Art. 67 Abs. 1 Ziff. 4 SchKG dient die Angabe des Forderungsgrunds nur der Orientierung des Betriebenen und macht auch das Fehlen jeglichen Hinweises den Zahlungsbefehl noch nicht nichtig (
                - link "BGE 121 III 18" [ref=e165] [cursor=pointer]:
                  - /url: https://search.bger.ch/ext/eurospider/live/de/php/clir/http/index.php?lang=de&type=show_document&page=1&from_date=&to_date=&from_year=1954&to_year=2025&sort=relevance&insertion_date=&from_date_push=&top_subcollection_clir=bge&query_words=&part=all&de_fr=&de_it=&fr_de=&fr_it=&it_de=&it_fr=&orig=&translation=&rank=0&highlight_docid=atf%3A%2F%2F121-III-18%3Ade&number_of_ranks=0&azaclir=clir#page18
                - text: E. 2a u. b S. 19 f. mit Hinweisen). Es erscheint daher nicht ausgeschlossen, dass die Parteien den Grund der Forderung anders verstehen konnten. Das Obergericht des Kantons Solothurn hat jedoch im Urteil vom 8. März 2011 erwogen, dass mit der Angabe des Zahlungsgrundes im Betreibungsbegehren die Forderung objektiv auf Schadenersatz und Genugtuung beschränkt worden sei. Ob dies zu Recht oder zu Unrecht angenommen wurde, sei dahingestellt. Da auch falsche Urteile - soweit sie nicht geradezu nichtig sind - in materielle Rechtskraft erwachsen, definiert das Vorurteil verbindlich, welche Anträge in diesem Verfahren aus welchem Lebenssachverhalt gestellt wurden. Das Obergericht des Kantons Solothurn hat im Urteil vom 8. März 2011 ausdrücklich die von der damaligen Beklagten und heutigen Beschwerdeführerin ins Verfahren eingebrachten Erfüllungsansprüche deswegen nicht berücksichtigt, weil sich die Anträge der Beschwerdegegnerin darauf nicht bezogen hätten. Den dadurch definierten Streitgegenstand der negativen Feststellungsklage konnte die Beschwerdeführerin als damalige Beklagte nicht erweitern; handelt es sich doch dabei, wie die Vorinstanz unter Hinweis auf Urteil 4A_568/2013 vom 16. April 2014 E. 2.2 zutreffend bemerkt, nicht um Verrechnungsforderungen.
                - generic [ref=e167]: BGE 142 III 210 S. 219
              - generic [ref=e168]: 4.2 Das Obergericht des Kantons Solothurn hat im Urteil vom 8. März 2011 verbindlich erklärt, wie das Feststellungsbegehren der Beschwerdegegnerin als damalige Klägerin zu verstehen sei. Danach hat die Beschwerdegegnerin die Feststellung verlangt, dass Forderungen aus Schadenersatz oder Genugtuung der Beschwerdeführerin gegen sie nicht bestehen. Das Obergericht hat daher die Klage auf Feststellung des Nichtbestehens der in Betreibung gesetzten Forderung gutgeheissen und die Löschung der Betreibung angeordnet, ausdrücklich ohne die von der damaligen Beklagten behaupteten Erfüllungsansprüche aus Werkvertrag, Auftrag und Darlehen zu beurteilen. Die rechtskräftig beurteilten Forderungen betreffen ausschliesslich solche aus Schadenersatz und Genugtuung. Die Vorinstanz hat im angefochtenen Urteil zwar erkannt, dass das Obergericht des Kantons Solothurn der Ansicht war, einzig zu beurteilen zu haben, ob eine Forderung aus "Schadenersatz" oder "Genugtuung" in der Höhe von Fr. 999'000.- bestehe. Sie hat sich jedoch bei der Prüfung der res iudicata zu Unrecht nicht darauf beschränkt, die Tragweite des Dispositivs des Urteils des Obergerichts des Kantons Solothurn vom 8. März 2011 im Lichte der Erwägungen dieses Urteils zu verstehen. Sie hat vielmehr den Streitgegenstand des damaligen Verfahrens abweichend vom Erstgericht definiert und mit der Erweiterung des Streitgegenstands nicht nur unzulässigerweise überprüft, wie das Obergericht des Kantons Solothurn die damaligen Rechtsbegehren der Beschwerdegegnerin hätte auslegen müssen, sondern im Ergebnis den Streitgegenstand dieses ersten Urteils und die Rechtskraftwirkung des Dispositivs unzulässigerweise erweitert. Mit dem Schluss, das Obergericht des Kantons Solothurn hätte in seinem Urteil vom 8. März 2011 bei richtigem Verständnis der Klagebegehren auch die im Verfahren vor der Vorinstanz (Handelsgericht des Kantons Bern) eingeklagten Ansprüche beurteilen müssen, weshalb sie als beurteilt zu gelten hätten, hat die Vorinstanz den Grundsatz der res iudicata verkannt. (...)
