    - generic [ref=e108]: 4.4.2 Vorliegend spricht das Interesse an der richtigen Rechtsanwendung bzw. an der Wahrung der Parteirechte des Beschwerdeführers klar für die Annahme der Nichtigkeit. Rechtssicherheits- bzw. Vertrauensschutzinteressen, welche dieses gewichtige Interesse überwiegen könnten, sind nicht ersichtlich. Hierbei ist insbesondere zu berücksichtigen, dass die Geheimnisträger im Wissen um und gestützt auf die Verfügung vom 30. August 2022 Auskunft gaben. Mit Blick auf deren Dahinfallen können sie sich daher auf den Standpunkt stellen, von einer gültigen Entbindung von der Schweigepflicht bzw. aufgrund der vermeintlich gültigen Entbindungsverfügung davon ausgegangen zu sein, rechtskonform zu handeln. Dass das zuständige Amt das Entbindungsverfahren nicht korrekt durchgeführt hat, ist ihnen allemal nicht anzulasten.
    - generic [ref=e109]: 4.4.3 Demzufolge wird die Rechtssicherheit durch die Annahme der Nichtigkeit der Verfügung vom 30. August 2022 nicht ernsthaft gefährdet.
    - generic [ref=e110]: 4.5 Die Entbindungsverfügung vom 30. August 2022 vermochte nach dem Gesagten mangels Eröffnung an den Beschwerdeführer keinerlei Rechtswirkungen zu entfalten (vgl. Urteil 2C_139/2016 vom 14. Juni 2016 E. 3.5 mit Hinweisen). Sie hat mithin keine rechtliche Existenz erlangt und ist dementsprechend im Sinne der bundesgerichtlichen Rechtsprechung nichtig. Der Antrag auf Nichtigkeitsfeststellung ist gutzuheissen. (...)