      - text: E. 2.3.2; Urteile 1C_586/2023 vom 27. Mai 2024 E. 3.1; 2C_146/2023 vom 25. Oktober 2023 E. 5.1; 2C_336/2022 vom 29. November 2022 E. 4.3) fällt in der vorliegenden Konstellation zudem von vornherein ausser Betracht, weil der Beschwerdeführer nie die Möglichkeit hatte, die Entbindungsverfügung vom 30. August 2022 wirksam anzufechten. In Bezug auf die Nichtigkeit ergibt sich damit, dass die beiden ersten Voraussetzungen gemäss der Evidenztheorie - ein besonders schwerer und offensichtlicher Mangel (vgl. E. 4.1 hiervor) - erfüllt sind.
