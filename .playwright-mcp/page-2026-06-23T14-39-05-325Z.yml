      - text: "E. 1.2.2; YVES DONZALLAZ, Traité de droit médical [nachfolgend: Traité], Bd. II, 2021, Rz. 6687; NIKLAUS OBERHOLZER, in: Basler Kommentar, Strafrecht, Bd. II, 4. Aufl. 2019, N. 23 zu Art. 321 StGB). Entsprechend kann die zuständige Behörde - von gewissen Ausnahmekonstellationen abgesehen (vgl. namentlich Art. 448 Abs. 2 ZGB) - eine Person nur dann vom Berufsgeheimnis entbinden, wenn sie dies selber beantragt hat, und ist die Entbindungsverfügung ausschliesslich dieser Person zuzustellen. Im hier zu beurteilenden Fall ersuchte die Arbeitgeberin der Geheimnisträger beim Amt für Gesundheit und Soziales um die Entbindung der Geheimnisträger von ihrer Schweigepflicht und wurde die angefochtene Verfügung nicht den Geheimnisträgern individuell, sondern der Arbeitgeberin zugestellt, die in der Folge gegen den Beschwerdeführer (...) Strafanzeige erstattete."
