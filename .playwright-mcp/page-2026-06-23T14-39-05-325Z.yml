      - text: Im hier zu beurteilenden Fall geht es - wie gesehen (vgl. E. 3.2 hiervor) - nicht um eine sich auf § 30 Abs. 2 GesG/SZ abstützende Meldung. Auch eine andere Rechtsgrundlage, die eine Meldung zugelassen hätte, ist nicht ersichtlich. In der Sache selbst begründeten die Vorinstanzen die Nichtanhörung des Beschwerdeführers im Entbindungsverfahren und die Nichtzustellung der Entbindungsverfügung an ihn nicht mit dem Vorliegen einer konkreten Gefahr für ein hochwertiges Rechtsgut, etwa die sexuelle Integrität eines bestimmten Kindes, sondern mit der Gefahr, dass der Beschwerdeführer Beweismittel vernichtet. Zur Rechtfertigung einer derart gravierenden Gehörsverletzung, wie sie vorliegend zur Diskussion steht, reicht dies vor dem dargelegten verfassungs- und konventionsrechtlichen Hintergrund nicht aus.
