    - generic [ref=e89]:
      - text: Abgesehen davon bewirkte die Nichtzustellung der Verfügung vom 30. August 2022 an den Beschwerdeführer - im Verbund mit seinem gänzlichen Ausschluss vom Entbindungsverfahren, in welchem ihm als Geheimnisherr die Stellung eines Verfügungsadressaten zukam (bzw. zugekommen wäre) -, dass dieser keine Möglichkeit hatte, sich vorgängig gegen die Entbindung zur Wehr zu setzen bzw. zu verhindern, dass es zur Offenbarung der ihn betreffenden Berufsgeheimnisse kommt. Der der Verfügung vom 30. August 2022 anhaftende Eröffnungsmangel erweist sich damit auf jeden Fall als besonders schwer. Der Mangel war darüber hinaus bereits bei Verfügungserlass offensichtlich, setzte sich das Amt für Gesundheit und Soziales doch gezielt über zentrale Vorgaben des Verfahrensrechts hinweg, um die Rahmenbedingungen für eine möglichst effektive Strafverfolgung des Beschwerdeführers zu schaffen. Indem die dafür erforderliche Preisgabe von Berufsgeheimnissen gegenüber den Strafverfolgungsbehörden schon erfolgt war, als der
      - generic [ref=e90]: BGE 152 I 9 S. 17
      - text: Beschwerdeführer von der Entbindung erfuhr, erwuchs ihm aus der Nichteröffnung der Entbindungsverfügung im Übrigen ein erheblicher Nachteil(vgl. E. 4.3.1 hiervor). Zwar konnte der Beschwerdeführer die Verfügung immer noch anfechten und seinen Standpunkt in die Rechtsmittelverfahren vor dem Regierungsrat und der Vorinstanz einbringen; Ziel des zuständigen Amts war es jedoch, zu verhindern, dass er dies tun kann, bevor es zur Einleitung einer Strafuntersuchung gegen ihn kommt. Das Vorgehen des Amts für Gesundheit und Soziales spricht somit auch unter diesem Blickwinkel für die Annahme der Nichtigkeit der Verfügung vom 30. August 2022.
    - generic [ref=e91]:
      - text: "4.3.4 Bedeutsam ist des Weiteren, dass der ärztlichen Schweigepflicht unterliegende persönliche Informationen in besonderem Mass schützenswert sind (vgl. Art. 13 BV, Art. 8 Ziff. 1 EMRK, Art. 27 ff. ZGB und Art. 5 lit. c Ziff. 2 des Bundesgesetzes vom 25. September 2020 über den Datenschutz [Datenschutzgesetz, DSG; SR 235.1]; vgl. auch Urteil des EGMR Bédat gegen Schweiz vom 29. März 2016 [Nr. 56925/08] § 76: \"le plus haut degré de protection\"). Behördliche Entbindungen von der Schweigepflicht sind demgemäss grundsätzlich als Eingriffe in die Privatsphäre zu qualifizieren, und umso wichtiger ist die Wahrung der Parteirechte der Betroffenen im Entbindungsverfahren (vgl. DONZALLAZ, Traité, a.a.O., Rz. 6699 f.). Zwar sieht die Rechtsordnung verschiedentlich vor, dass dem Berufsgeheimnis unterstehende Personen den Behörden gewisse der Schweigepflicht unterliegende Wahrnehmungen direkt, d.h. ohne vorgängiges Entbindungsverfahren, melden dürfen oder sogar müssen (vgl. neben § 30 Abs. 2 GesG/SZ vor allem auch"
