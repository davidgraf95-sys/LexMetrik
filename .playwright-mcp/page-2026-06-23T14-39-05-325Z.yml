    - generic [ref=e24]: BGE 152 I 9 S. 10
    - generic [ref=e25]: A. A. (Jahrgang 1999) begab sich von Ende Februar bis Anfang April 2022 in die Klinik B. in stationäre Behandlung. Während seines Klinikaufenthalts kam im Rahmen seiner Behandlung auch sein Konsum von Kinderpornografie zur Sprache.
    - generic [ref=e26]: B.
    - generic [ref=e27]: B.a Im Mai 2022 ersuchte die Klinik B. das Amt für Gesundheit und Soziales des Kantons Schwyz betreffend A. um Entbindung von der beruflichen Schweigepflicht gegenüber den Strafverfolgungsbehörden und den eigenen Anwälten. Es bestehe bei A. die Gefahr des weiteren Konsums von Kinderpornografie sowie das Risiko einer Fremdgefährdung.
    - generic [ref=e28]: Mit Verfügung vom 7. Juni 2022 entband das Amt für Gesundheit und Soziales den leitenden Psychologen der Klinik B., Dr. C., gegenüber den Strafverfolgungsbehörden des Kantons Schwyz und einem Rechtsanwalt von der beruflichen Schweigepflicht zwecks Bekanntgabe der Personalien, des Patientenverhältnisses und der Patientengeschichte von A. Das Amt verzichtete auf die vorgängige Anhörung von A. und stellte die Verfügung ausschliesslich der Klinik zu.
    - generic [ref=e29]:
      - text: B.b Nachdem die Klinik B. das Amt für Gesundheit und Soziales im Juli 2022 um Ausweitung der gewährten Schweigepflichtentbindung ersucht hatte, verfügte dieses am 30. August 2022 neu. Es hob die Verfügung vom 7. Juni 2022 auf und entband Dr. C. und drei weitere Klinikangestellte gegenüber den Strafverfolgungsbehörden der Kantone Schwyz und Luzern sowie drei Juristen und deren Hilfspersonen von der beruflichen Schweigepflicht zwecks Bekanntgabe der Personalien, des Patientenverhältnisses und der Patientengeschichte von A. Das Amt verzichtete erneut auf die vorgängige Anhörung von A. und stellte die Verfügung wiederum ausschliesslich der Klinik zu.
      - generic [ref=e30]: BGE 152 I 9 S. 11
    - generic [ref=e31]: B.c Am 7. Oktober 2022 reichte die Klinik B. bei der Staatsanwaltschaft des Kantons Schwyz gegen A. Strafanzeige wegen harter Pornografie ein. Anlässlich der Einsichtnahme in die Akten der Strafuntersuchung erhielt die Rechtsvertreterin von A. am 6. Februar 2023 Kenntnis von der Schweigepflichtentbindung. Die von A. gegen die Entbindung erhobenen kantonalen Rechtsmittel wiesen der Regierungsrat und das Verwaltungsgericht des Kantons Schwyz ab. Letzteres mit Entscheid vom 29. Mai 2024.
    - generic [ref=e32]: C. A. gelangt mit Beschwerde in öffentlich-rechtlichen Angelegenheiten ans Bundesgericht. Er beantragt im Wesentlichen, der Entscheid des Verwaltungsgerichts des Kantons Schwyz vom 29. Mai 2024 sei aufzuheben und die Nichtigkeit der Verfügung vom 30. August 2022 festzustellen.
    - generic [ref=e33]: Das Bundesgericht heisst die Beschwerde gut.
    - generic [ref=e34]: (Zusammenfassung)
    - generic [ref=e35]: Erwägungen
    - generic [ref=e36]: "Aus den Erwägungen:"
    - generic [ref=e37]: 3. Streitgegenstand vor Bundesgericht bildet die Frage, ob die Vorinstanz die am 30. August 2022 seitens des Amts für Gesundheit und Soziales verfügte Entbindung von der beruflichen Schweigepflicht zu Recht bestätigte.
    - generic [ref=e38]:
      - text: 3.1 Das kantonale Gericht erwog zusammengefasst, die strittige Berufsgeheimnisentbindung richte sich nach Art. 321 Ziff. 2 StGB, was zur Folge habe, dass eine Interessenabwägung vorzunehmen sei. Sodann sei die Entbindungsverfügung vom 30. August 2022 aufgrund der nicht erfolgten vorgängigen Anhörung des Beschwerdeführers sowie des Umstands, dass ihm die besagte Verfügung nicht eröffnet wurde, weder nichtig noch aufzuheben. Beides lasse sich vielmehr gestützt auf § 21 Abs. 3 lit. e des Verwaltungsrechtspflegegesetzes des Kantons Schwyz vom 6. Juni 1974 (VRP/SZ; SRSZ 234.110) rechtfertigen, namentlich mit der Gefahr der Vereitelung der angestrebten Strafuntersuchung durch die Vernichtung von Beweismitteln seitens des Beschwerdeführers. Des Weiteren sei die durch den Regierungsrat geschützte Interessenabwägung des Amts für Gesundheit und Soziales nicht rechtsfehlerhaft. Zwar bestehe ein erhebliches Interesse daran, dass sich Personen mit pädophilen Neigungen in einem geschützten Rahmen zu dieser sexuellen Präferenz äussern können. Gegen die Geheimnisentbindung spreche
      - generic [ref=e39]: BGE 152 I 9 S. 12
      - text: ferner, dass eine Verurteilung des Beschwerdeführers, der als Tischtennistrainer mit Minderjährigen arbeitet, zu einem Tätigkeitsverbot führen könnte. Der Beschwerdeführer habe indessen nicht nur vor und während des Klinikaufenthalts, sondern - wie sich anlässlich seiner polizeilichen Einvernahme vom 22. Januar 2023 bestätigt habe - auch danach kinderpornografisches Material konsumiert und die ihm empfohlene fachspezifische Hilfe nicht in Anspruch genommen. Kinderpornografie basiere auf unerlaubten Handlungen mit Kindern, deren Integrität und Gesundheit es unbedingt zu schützen gelte, und der Konsum entsprechenden Materials sei zumindest ein Vergehen, sodass kein Raum für die vom Beschwerdeführer vorgenommenen Bagatellisierungen bleibe. Sich gegenüber einer Fachkraft zu öffnen, dürfe Strafuntersuchungen nicht ausschliessen, wenn feststehe, dass der Betroffene Hilfestellungen ablehne und weiterdelinquiere. Insgesamt bestehe - nicht zuletzt auch aufgrund diverser beim Beschwerdeführer diagnostizierter Krankheiten bzw. gesundheitlicher Probleme - eine erhöhte Gefahr, dass es zu weiterem Konsum kinderpornografischen Materials und damit zu weiteren Opfern komme. Das öffentliche Interesse an der strittigen Entbindung sei folglich relevant höher einzustufen als das Geheimhaltungsinteresse des Beschwerdeführers.
    - generic [ref=e40]: 3.2 Vor Bundesgericht ist unbestritten, dass die vier seitens des kantonalen Amts für Gesundheit und Soziales von der beruflichen Schweigepflicht entbundenen Psychologinnen und Psychologen der Klinik B. als anerkannte Psychotherapeutinnen und -therapeuten dem Berufsgeheimnis unterstehen (vgl. Art. 27 lit. e des Psychologieberufegesetzes vom 18. März 2011 [PsyG; SR 935.81]) und dass der Beschwerdeführer ihnen gegenüber persönliche Angaben offenbarte, die unter das Berufsgeheimnis fallen. Unbestritten ist überdies, dass auf die Entbindung der besagten Personen von der beruflichen Schweigepflicht ausschliesslich Art. 321 Ziff. 2 StGB anwendbar ist und dass sich die erfolgte Preisgabe von Berufsgeheimnissen gegenüber den Strafverfolgungsbehörden nicht auf das Anzeigerecht gemäss § 30 Abs. 2 des Gesundheitsgesetzes des Kantons Schwyz vom 16. Oktober 2002 (GesG/SZ; SRSZ 571.110) abstützte (vgl. Art. 321 Ziff. 3 StGB; vgl. dazu E. 4.3.4 hiernach).
    - generic [ref=e41]:
      - text: 4. Der Beschwerdeführer bringt vor, die Verfügung vom 30. August 2022 sei nichtig. Indem ihn das Amt für Gesundheit und Soziales vor deren Erlass nicht angehört und ihm die Verfügung überdies
      - generic [ref=e42]: BGE 152 I 9 S. 13
      - text: nicht eröffnet habe, habe es seine Verfahrensrechte in derart eklatanter Weise verletzt, dass Nichtigkeit vorliege.
    - generic [ref=e43]:
      - text: 4.1 Fehlerhafte Entscheide sind nach der bundesgerichtlichen Rechtsprechung in der Regel bloss anfechtbar. Nichtig, d.h. absolut unwirksam, sind sie nach der sog. Evidenztheorie einzig dann, wenn der ihnen anhaftende Mangel (1) besonders schwer ist, wenn er sich (2) als offensichtlich oder zumindest leicht erkennbar erweist und (3) die Rechtssicherheit durch die Annahme der Nichtigkeit nicht ernsthaft gefährdet wird. Sind die ersten beiden Voraussetzungen erfüllt, liegt ein Nichtigkeitsgrund vor. Inhaltliche Mängel einer Entscheidung stellen nur ganz ausnahmsweise Nichtigkeitsgründe dar. Als solche fallen vorab die funktionelle und sachliche Unzuständigkeit der entscheidenden Behörde sowie krasse Verfahrensfehler in Betracht (vgl.
